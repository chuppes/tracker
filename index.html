<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Instrument+Serif:ital@0;1&family=Martian+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#090909;
  --s1:#0e0e0e;
  --s2:#131313;
  --s3:#181818;
  --s4:#1e1e1e;

  --bd:rgba(255,255,255,0.05);
  --bd2:rgba(255,255,255,0.09);
  --bd3:rgba(255,255,255,0.14);

  --t1:#f0eeeb;
  --t2:rgba(240,238,235,0.5);
  --t3:rgba(240,238,235,0.26);
  --t4:rgba(240,238,235,0.07);

  --a:#c0bdb8;
  --a2:#a8a5a0;
  --a-dim:rgba(192,189,184,0.07);
  --a-glow:rgba(192,189,184,0.13);
  --a-ring:rgba(192,189,184,0.2);

  --glass-bg:rgba(18,18,18,0.7);
  --glass-border:rgba(255,255,255,0.06);

  --danger:#b07070;

  --r:18px;
  --r-sm:12px;
  --r-xs:9px;

  --font:'Instrument Serif',Georgia,serif;
  --display:'Bebas Neue',sans-serif;
  --mono:'Martian Mono',monospace;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}

html{height:100%;background:var(--bg)}
body{
  background:var(--bg);
  color:var(--t1);
  font-family:var(--font);
  min-height:100dvh;
  overflow-x:hidden;
  padding-bottom:calc(88px + var(--safe-b));
  -webkit-font-smoothing:antialiased;
}

/* subtle grain */
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.04;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  background-size:128px 128px;
}

/* ── SPLASH ── */
#splash{
  position:fixed;inset:0;background:#090909;
  display:flex;align-items:center;justify-content:center;
  z-index:1000;transition:opacity 0.4s ease;
}
.sp{
  text-align:center;opacity:0;transform:translateY(14px);
  transition:opacity 0.7s cubic-bezier(0.22,1,0.36,1),transform 0.7s cubic-bezier(0.22,1,0.36,1);
}
.sp.show{opacity:1;transform:none}
.sp.exit{opacity:0;transform:translateY(-10px);transition-duration:0.3s}
.sp-logo{
  font-family:var(--display);
  font-size:4.5rem;
  letter-spacing:0.12em;
  color:var(--t1);
  line-height:1;
}
.sp-rule{
  width:24px;height:1px;background:var(--t3);
  margin:18px auto;
  transform:scaleX(0);transform-origin:left center;
  transition:transform 1.1s cubic-bezier(0.22,1,0.36,1) 0.3s;
}
.sp.show .sp-rule{transform:scaleX(1)}
.sp-sub{font-family:var(--mono);font-size:0.5rem;color:var(--t3);letter-spacing:0.28em;text-transform:uppercase}

/* ── APP ── */
#app{position:relative;z-index:1}
#app.hidden{display:none}
#app.in{animation:ap 0.6s cubic-bezier(0.22,1,0.36,1) both}
@keyframes ap{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* ── HEADER ── */
.hdr{
  padding:calc(var(--safe-t) + 48px) 20px 18px;
  display:flex;align-items:flex-end;justify-content:space-between;
  position:sticky;top:0;z-index:10;
  background:rgba(9,9,9,0.75);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.04);
}
.hdr-left{}
.hdr-eye{
  font-family:var(--mono);font-size:0.46rem;color:var(--t3);
  letter-spacing:0.24em;text-transform:uppercase;margin-bottom:6px;
}
.hdr-title{
  font-family:var(--display);
  font-size:2.8rem;
  letter-spacing:0.08em;
  line-height:0.9;
  color:var(--t1);
}
.hdr-actions{display:flex;gap:6px;padding-bottom:4px}
.ic{
  width:32px;height:32px;border-radius:var(--r-xs);
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.07);
  color:var(--t3);display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transition:background 0.15s,border-color 0.15s,color 0.15s,transform 0.12s cubic-bezier(0.34,1.56,0.64,1);
  -webkit-user-select:none;user-select:none;
}
.ic:hover{background:rgba(255,255,255,0.06);color:var(--t1)}
.ic:active{transform:scale(0.82)}
.ic svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}

/* ── DAYS ── */
.sec-lbl{
  font-family:var(--mono);font-size:0.46rem;color:var(--t3);
  letter-spacing:0.24em;text-transform:uppercase;
  padding:0 20px;margin-bottom:10px;margin-top:18px;
}
.dscroll{overflow-x:auto;padding:0 16px 4px;scrollbar-width:none}
.dscroll::-webkit-scrollbar{display:none}
.drow{display:flex;gap:6px;width:max-content;padding:2px}

.dp{
  display:flex;flex-direction:column;align-items:center;cursor:pointer;
  -webkit-user-select:none;user-select:none;
  transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
}
.dp:active{transform:scale(0.84)}
.dp-ring{position:relative;width:54px;height:54px}
.dp-ring svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)}
.dp-ring circle{fill:none;stroke-width:1.5}
.rt{stroke:rgba(255,255,255,0.06)}
.rp{stroke:var(--t3);stroke-linecap:round;transition:stroke-dashoffset 0.7s cubic-bezier(0.22,1,0.36,1),stroke 0.25s}
.dp.act .rp{stroke:var(--a)}
.dp.dn .rp{stroke:var(--a2)}

.dp-bg{
  position:absolute;inset:6px;border-radius:50%;
  background:transparent;
  transition:background 0.25s,box-shadow 0.25s;
}
.dp.act .dp-bg{
  background:rgba(192,189,184,0.05);
  box-shadow:inset 0 0 0 1px rgba(192,189,184,0.15);
}
.dp-face{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
.dp-em{font-size:1rem;line-height:1}
.dp-pct{font-family:var(--mono);font-size:0.44rem;color:var(--t3);line-height:1;margin-top:2px;transition:color 0.2s}
.dp.act .dp-pct{color:var(--a)}
.dp.dn .dp-pct{color:var(--a2)}
.dp-nm{
  font-family:var(--mono);font-size:0.44rem;color:var(--t3);
  margin-top:5px;letter-spacing:0.06em;transition:color 0.2s;
}
.dp.act .dp-nm{color:var(--t2)}

/* ── DAY CARD ── */
.dcard{
  margin:14px 16px 0;
  border-radius:var(--r);
  overflow:hidden;
  position:relative;
  background:var(--s2);
  border:1px solid rgba(255,255,255,0.055);
  box-shadow:0 1px 0 rgba(255,255,255,0.04) inset, 0 8px 32px rgba(0,0,0,0.4);
}

.dhdr{
  padding:18px 18px 14px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.dmeta{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.dicon{
  width:28px;height:28px;font-size:0.9rem;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:var(--r-xs);
}
.dtag{
  font-family:var(--mono);font-size:0.46rem;color:var(--t3);
  letter-spacing:0.14em;text-transform:uppercase;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);
  padding:2px 9px;border-radius:20px;
}
.dname{
  font-family:var(--font);
  font-size:1.15rem;
  font-weight:400;
  font-style:italic;
  letter-spacing:0.01em;
  line-height:1.3;
  color:var(--t1);
}
.dprow{display:flex;align-items:center;gap:10px;margin-top:12px}
.dptrack{flex:1;height:1px;background:var(--t4);border-radius:1px;overflow:hidden}
.dpfill{height:100%;background:var(--a);border-radius:1px;transition:width 0.6s cubic-bezier(0.22,1,0.36,1)}
.dppct{font-family:var(--mono);font-size:0.52rem;color:var(--a2);min-width:34px;text-align:right}

/* ── EXERCISE ROW ── */
.ex{
  display:flex;gap:12px;padding:13px 18px;
  border-bottom:1px solid rgba(255,255,255,0.04);
  transition:background 0.15s;
  position:relative;
}
.ex:last-of-type{border-bottom:none}
.ex:active{background:rgba(255,255,255,0.015)}
.ex.dn{background:rgba(255,255,255,0.012)}
.ex.dn::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:1.5px;
  background:var(--a2);
}

/* toggle */
.tgl{
  margin-top:2px;flex-shrink:0;width:20px;height:20px;border-radius:6px;
  border:1.5px solid rgba(255,255,255,0.1);background:transparent;
  position:relative;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.2s,border-color 0.2s,transform 0.12s cubic-bezier(0.34,1.56,0.64,1);
}
.tgl::after{
  content:'';position:absolute;
  width:6px;height:4px;
  border-left:1.5px solid transparent;border-bottom:1.5px solid transparent;
  transform:rotate(-47deg) translate(1px,-0.5px);transition:border-color 0.13s;
}
.tgl.on{background:var(--a2);border-color:transparent;}
.tgl.on::after{border-color:rgba(9,9,9,0.9)}
.tgl:active{transform:scale(0.76)}

.exb{flex:1;min-width:0}
.exr1{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.exnm{
  font-family:var(--font);
  font-size:0.88rem;
  font-style:italic;
  line-height:1.35;
  color:var(--t1);
  transition:color 0.2s;
}
.ex.dn .exnm{color:var(--t3);text-decoration:line-through;text-decoration-color:var(--t4)}
.exsets{
  font-family:var(--mono);font-size:0.46rem;color:var(--t2);
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);
  padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;letter-spacing:0.06em;
}
.exdsc{font-family:var(--mono);font-size:0.5rem;color:var(--t3);margin-top:3px;line-height:1.5;letter-spacing:0.02em}
.exwt{display:flex;align-items:center;gap:8px;margin-top:9px}
.wtlbl{font-family:var(--mono);font-size:0.46rem;color:var(--t3);letter-spacing:0.1em}
.stepper{
  display:flex;align-items:center;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:var(--r-xs);overflow:hidden;
}
.stbtn{
  width:28px;height:26px;background:transparent;border:none;
  color:var(--t2);font-family:var(--font);font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:background 0.12s,color 0.12s,transform 0.1s;
  -webkit-user-select:none;user-select:none;
}
.stbtn:hover{background:rgba(255,255,255,0.05);color:var(--t1)}
.stbtn:active{transform:scale(0.76)}
.stval{
  font-family:var(--mono);font-size:0.62rem;font-weight:400;
  color:var(--t1);min-width:36px;text-align:center;
  background:transparent;border:none;outline:none;padding:0 2px;
}
.stval::placeholder{color:var(--t3)}
.stunit{font-family:var(--mono);font-size:0.46rem;color:var(--t3);padding-right:8px}

/* ── ADD FORM ── */
.addbtn{
  display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:12px;
  background:transparent;border:none;border-top:1px solid rgba(255,255,255,0.04);
  color:var(--t3);font-family:var(--mono);font-size:0.5rem;letter-spacing:0.12em;
  text-transform:uppercase;cursor:pointer;
  transition:color 0.15s,background 0.15s;
}
.addbtn:hover{color:var(--a);background:rgba(255,255,255,0.02)}
.addbtn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.addform{
  border-top:1px solid rgba(255,255,255,0.04);
  background:rgba(255,255,255,0.015);
  padding:14px 18px;display:none;flex-direction:column;gap:9px;
}
.addform.open{display:flex;animation:sld 0.26s cubic-bezier(0.22,1,0.36,1) both}
@keyframes sld{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
.afi{
  width:100%;padding:8px 11px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  color:var(--t1);font-family:var(--mono);font-size:0.62rem;
  border-radius:var(--r-xs);outline:none;letter-spacing:0.02em;
  transition:border-color 0.15s,background 0.15s;
}
.afi:focus{border-color:rgba(192,189,184,0.4);background:rgba(255,255,255,0.05)}
.afi::placeholder{color:var(--t3)}
.afrow{display:flex;gap:7px}
.afrow .afi{flex:1}
.afacts{display:flex;gap:7px}
.afok{
  flex:1;padding:9px;
  background:var(--a2);border:none;color:rgba(9,9,9,0.9);
  font-family:var(--mono);font-size:0.5rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;
  border-radius:var(--r-xs);cursor:pointer;
  transition:background 0.15s,transform 0.12s;
}
.afok:hover{background:var(--a)}
.afok:active{transform:scale(0.96)}
.afno{
  padding:9px 14px;background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);color:var(--t2);
  font-family:var(--mono);font-size:0.5rem;letter-spacing:0.1em;text-transform:uppercase;
  border-radius:var(--r-xs);cursor:pointer;transition:all 0.15s;
}
.afno:hover{color:var(--t1);background:rgba(255,255,255,0.06)}

/* ── STATS ── */
.stats{margin:14px 16px 0}
.sthd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.stlb{font-family:var(--mono);font-size:0.46rem;color:var(--t3);letter-spacing:0.24em;text-transform:uppercase}
.rstbtn{
  display:flex;align-items:center;gap:4px;
  padding:4px 11px;background:transparent;
  border:1px solid rgba(255,255,255,0.07);
  color:var(--t3);font-family:var(--mono);font-size:0.46rem;letter-spacing:0.08em;text-transform:uppercase;
  border-radius:20px;cursor:pointer;transition:all 0.15s;
}
.rstbtn svg{width:9px;height:9px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.rstbtn:hover{border-color:var(--danger);color:var(--danger)}

.chcard{
  background:var(--s2);
  border:1px solid rgba(255,255,255,0.055);
  border-radius:var(--r);padding:16px;
  box-shadow:0 1px 0 rgba(255,255,255,0.04) inset;
}
.chbars{display:flex;gap:5px;align-items:flex-end;height:64px}
.chcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.chbw{flex:1;width:100%;display:flex;align-items:flex-end}
.chb{
  width:100%;min-height:2px;
  background:rgba(255,255,255,0.04);
  border-radius:2px 2px 0 0;
  position:relative;overflow:hidden;
  transition:height 0.55s cubic-bezier(0.22,1,0.36,1);
}
.chb.f::after{content:'';position:absolute;inset:0;background:var(--a2);border-radius:inherit;opacity:0.6}
.chb.c{box-shadow:0 0 0 1px rgba(192,189,184,0.3)}
.chb.c::after{opacity:1}
.chlb{font-family:var(--mono);font-size:0.42rem;color:var(--t3);text-align:center;line-height:1.4}
.chlb b{display:block;color:var(--t2);font-weight:500}
.stdiv{height:1px;background:rgba(255,255,255,0.05);margin:14px 0}
.trow{display:flex;align-items:center;justify-content:space-between;gap:12px}
.tnums{
  font-family:var(--display);
  font-size:2.6rem;
  letter-spacing:0.05em;
  color:var(--t1);line-height:0.9;
}
.tnums em{color:var(--a);font-style:normal}
.tsub{font-family:var(--mono);font-size:0.46rem;color:var(--t3);margin-top:7px;letter-spacing:0.1em}
.tring{width:46px;height:46px;flex-shrink:0;position:relative}
.tring svg{transform:rotate(-90deg);width:100%;height:100%}
.trk{fill:none;stroke:rgba(255,255,255,0.06);stroke-width:3}
.trf{fill:none;stroke:var(--a2);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset 0.9s cubic-bezier(0.22,1,0.36,1)}
.trpct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:0.5rem;color:var(--a)}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:calc(76px + var(--safe-b));left:50%;
  transform:translateX(-50%) translateY(10px);
  background:rgba(20,20,20,0.9);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:100px;
  padding:8px 18px;font-family:var(--mono);font-size:0.5rem;
  color:var(--t1);white-space:nowrap;letter-spacing:0.1em;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
  z-index:500;opacity:0;pointer-events:none;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  transition:opacity 0.22s,transform 0.22s cubic-bezier(0.22,1,0.36,1);
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── BURST ── */
@keyframes br{0%{transform:scale(0.5);opacity:0.7}100%{transform:scale(2.2);opacity:0}}
.bst{position:fixed;border-radius:50%;border:1px solid var(--a);animation:br 0.4s cubic-bezier(0.22,1,0.36,1) forwards;pointer-events:none;z-index:999}
@keyframes cpt{0%{opacity:1}100%{opacity:0;transform:translate(var(--tx),var(--ty)) rotate(180deg)}}
.cpt{position:fixed;width:3px;height:3px;border-radius:1px;animation:cpt 0.6s cubic-bezier(0.22,1,0.36,1) forwards;pointer-events:none;z-index:999}

footer{
  text-align:center;
  font-family:var(--mono);font-size:0.44rem;
  color:var(--t3);letter-spacing:0.18em;
  text-transform:uppercase;
  padding:18px 16px 8px;
}
</style>
</head>
<body>

<div id="splash">
  <div class="sp" id="sp">
    <div class="sp-logo">TRACKER</div>
    <div class="sp-rule"></div>
    <div class="sp-sub">тренировки · прогресс</div>
  </div>
</div>

<div id="app" class="hidden"></div>
<div class="toast" id="toast"></div>

<script>
const SK='trk_p3',EK='trk_c3',WK='trk_w3';

const BASE=[
  {day:'День 1',name:'Грудь · Передняя дельта · Трицепс',icon:'🔥',exercises:[
    {name:'Жим штанги лёжа',sets:'4×8–10',desc:'основа массы груди'},
    {name:'Жим гантелей на наклонной 30°',sets:'4×10–12',desc:'верх груди'},
    {name:'Отжимания на брусьях с весом',sets:'3×макс',desc:'трицепс + низ груди'},
    {name:'Французский жим EZ-гриф',sets:'3×12',desc:'трицепс изоляция'},
    {name:'Разгибание на блоке (канат)',sets:'3×15',desc:'добивка трицепса'}
  ]},
  {day:'День 2',name:'Спина · Задняя дельта · Бицепс',icon:'💪',exercises:[
    {name:'Подтягивания широким хватом',sets:'4×8–10',desc:'ширина спины'},
    {name:'Тяга штанги в наклоне',sets:'4×10',desc:'толщина спины'},
    {name:'Тяга гантели одной рукой',sets:'3×12',desc:'нижняя широчайшая'},
    {name:'Махи гантелями в наклоне',sets:'3×15',desc:'задний пучок дельты'},
    {name:'Подъём штанги на бицепс',sets:'3×10',desc:'база на бицепс'},
    {name:'Молотки с гантелями',sets:'3×12',desc:'плечо + брахиалис'},
    {name:'Шраги с гантелями',sets:'3×15–20',desc:'верх трапеций'}
  ]},
  {day:'День 3',name:'Отдых · Растяжка',icon:'🧘',exercises:[
    {name:'Растяжка всего тела',sets:'10–15 мин',desc:'восстановление и мобильность'}
  ]},
  {day:'День 4',name:'Ноги · Пресс · Поясница',icon:'🦵',exercises:[
    {name:'Приседания со штангой',sets:'4×8',desc:'база ног'},
    {name:'Румынская тяга',sets:'4×10',desc:'бицепс бедра + ягодицы'},
    {name:'Выпады с гантелями',sets:'3×12/н',desc:'координация + объём'},
    {name:'Сгибание ног в тренажёре',sets:'3×12',desc:'изоляция'},
    {name:'Подъёмы на носки стоя',sets:'4×15–20',desc:'икры'},
    {name:'Скручивания на римском стуле',sets:'3×20',desc:'верх пресса'},
    {name:'Боковые скручивания с блином',sets:'3×15/ст',desc:'косые'},
    {name:'Гиперэкстензия',sets:'3×15',desc:'поясница'}
  ]},
  {day:'День 5',name:'Плечи · Руки · Пресс',icon:'💎',exercises:[
    {name:'Жим гантелей сидя',sets:'4×10',desc:'передний пучок'},
    {name:'Махи гантелями в стороны',sets:'4×15–20',desc:'средний пучок'},
    {name:'Жим лёжа узким хватом',sets:'3×10',desc:'трицепс'},
    {name:'Молотки с супинацией',sets:'3×12',desc:'бицепс'},
    {name:'Планка с касанием плеча',sets:'3×60 сек',desc:'стабилизация кора'},
    {name:'Вакуум в животе',sets:'5×30 сек',desc:'глубокий пресс'}
  ]},
  {day:'День 6',name:'Полный отдых',icon:'😴',exercises:[
    {name:'Восстановление',sets:'растяжка',desc:'дай телу отдохнуть'}
  ]},
  {day:'День 7',name:'Полный отдых',icon:'🌿',exercises:[
    {name:'Восстановление',sets:'сон',desc:'сон — лучший анаболик'}
  ]}
];

const MOT=['+ 1 к силе.','готово.','зачёт.','сделано.','работа идёт.','по плану.','держишь.','ещё один.'];
const DONE=['день закрыт.','сотня процентов.','всё сделано.','отличный день.'];
const rnd=a=>a[Math.floor(Math.random()*a.length)];

let wt={},cu={},pr={},day=0,form=false;

function load(){
  try{wt=JSON.parse(localStorage.getItem(WK))||{}}catch{wt={}}
  try{cu=JSON.parse(localStorage.getItem(EK))||{}}catch{cu={}}
  try{pr=JSON.parse(localStorage.getItem(SK))||{}}catch{pr={}}
  day=(new Date().getDay()+6)%7;
}
function save(){
  localStorage.setItem(WK,JSON.stringify(wt));
  localStorage.setItem(EK,JSON.stringify(cu));
  localStorage.setItem(SK,JSON.stringify(pr));
}
function prog(){
  const p=JSON.parse(JSON.stringify(BASE));
  for(let i=0;i<p.length;i++){const k=`d${i}`;if(cu[k]?.length)p[i].exercises.push(...cu[k]);}
  return p;
}
function dstat(p,i){let d=0;p[i].exercises.forEach((_,e)=>{if(pr[`${i}_${e}`])d++;});return{d,t:p[i].exercises.length};}

let _tt;
function toast(m){const el=document.getElementById('toast');if(!el)return;el.textContent=m;el.classList.add('on');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('on'),2100);}
function burst(el){
  const r=el.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;
  const b=document.createElement('div');b.className='bst';
  b.style.cssText=`left:${cx-14}px;top:${cy-14}px;width:28px;height:28px`;
  document.body.appendChild(b);setTimeout(()=>b.remove(),450);
  ['#c0bdb8','#a8a5a0','#f0eeeb','#888580'].forEach((c,i)=>{
    const p=document.createElement('div');p.className='cpt';
    const a=(i/4)*Math.PI*2,d=18+Math.random()*12;
    p.style.cssText=`left:${cx-1.5}px;top:${cy-1.5}px;background:${c};--tx:${(Math.cos(a)*d).toFixed(0)}px;--ty:${(Math.sin(a)*d).toFixed(0)}px`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),680);
  });
}
function hap(t='l'){if(!navigator.vibrate)return;if(t==='l')navigator.vibrate(7);else if(t==='m')navigator.vibrate([10,5,10]);else if(t==='s')navigator.vibrate([8,4,8,4,14]);}
function esc(s){if(!s)return'';return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

function render(){
  const p=prog(),st=p.map((_,i)=>dstat(p,i));
  const td=st.reduce((s,x)=>s+x.d,0),tt=st.reduce((s,x)=>s+x.t,0);
  const tpct=tt?Math.round(td/tt*100):0;
  const dc=2*Math.PI*24,rc=2*Math.PI*21;
  const h=new Date().getHours();
  const gr=h<6?'ночная сессия':h<12?'доброе утро':h<18?'добрый день':'добрый вечер';

  let html=`
  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-eye">${gr}</div>
      <div class="hdr-title">TRACKER</div>
    </div>
    <div class="hdr-actions">
      <div class="ic" id="expB" title="Экспорт CSV">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </div>
    </div>
  </div>

  <div class="sec-lbl">Неделя</div>
  <div class="dscroll"><div class="drow">`;

  p.forEach((d,i)=>{
    const s=st[i],pct=s.t?s.d/s.t:0,off=(dc*(1-pct)).toFixed(2),dn=s.d===s.t&&s.t>0;
    html+=`<div class="dp${i===day?' act':''}${dn?' dn':''}" data-i="${i}">
      <div class="dp-ring">
        <div class="dp-bg"></div>
        <svg viewBox="0 0 56 56">
          <circle class="rt" cx="28" cy="28" r="24" stroke-dasharray="${dc.toFixed(2)}"/>
          <circle class="rp" cx="28" cy="28" r="24" stroke-dasharray="${dc.toFixed(2)}" stroke-dashoffset="${off}"/>
        </svg>
        <div class="dp-face"><div class="dp-em">${d.icon}</div><div class="dp-pct">${Math.round(pct*100)}%</div></div>
      </div>
      <div class="dp-nm">${d.day.replace('День ','Д')}</div>
    </div>`;
  });
  html+=`</div></div>`;

  const cd=p[day],cs2=st[day],cpct=cs2.t?Math.round(cs2.d/cs2.t*100):0;
  let exs='';
  cd.exercises.forEach((ex,ei)=>{
    const k=`${day}_${ei}`,on=pr[k]||false,wv=parseFloat(wt[k])||0;
    exs+=`<div class="ex${on?' dn':''}">
      <div class="tgl${on?' on':''}" data-di="${day}" data-ei="${ei}"></div>
      <div class="exb">
        <div class="exr1"><span class="exnm">${esc(ex.name)}</span><span class="exsets">${esc(ex.sets)}</span></div>
        <div class="exdsc">${esc(ex.desc)}</div>
        <div class="exwt">
          <span class="wtlbl">КГ</span>
          <div class="stepper">
            <button class="stbtn" data-k="${k}" data-s="-2.5">−</button>
            <input class="stval" type="text" inputmode="decimal" value="${wv||''}" placeholder="—" data-k="${k}">
            <span class="stunit">кг</span>
            <button class="stbtn" data-k="${k}" data-s="2.5">+</button>
          </div>
        </div>
      </div>
    </div>`;
  });

  exs+=`
  <button class="addbtn" id="addB">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    добавить упражнение
  </button>
  <div class="addform${form?' open':''}" id="addF">
    <input class="afi" id="afn" type="text" placeholder="название упражнения" autocomplete="off">
    <div class="afrow">
      <input class="afi" id="afs" type="text" placeholder="подходы" autocomplete="off">
      <input class="afi" id="afd" type="text" placeholder="описание" autocomplete="off">
    </div>
    <div class="afacts"><button class="afok" id="afok">Добавить</button><button class="afno" id="afno">Отмена</button></div>
  </div>`;

  html+=`
  <div class="dcard">
    <div class="dhdr">
      <div class="dmeta"><div class="dicon">${cd.icon}</div><div class="dtag">${cd.day}</div></div>
      <div class="dname">${esc(cd.name)}</div>
      <div class="dprow"><div class="dptrack"><div class="dpfill" style="width:${cpct}%"></div></div><div class="dppct">${cs2.d}/${cs2.t}</div></div>
    </div>
    ${exs}
  </div>`;

  const mx=Math.max(...st.map(s=>s.d),1);
  let bars='';
  st.forEach((s,i)=>{
    const bh=s.d===0?2:Math.max(4,Math.round((s.d/mx)*56));
    bars+=`<div class="chcol"><div class="chbw"><div class="chb${s.d>0?' f':''}${i===day?' c':''}" style="height:${bh}px"></div></div><div class="chlb"><b>${s.d}</b>/${s.t}</div></div>`;
  });

  html+=`
  <div class="stats">
    <div class="sthd">
      <div class="stlb">прогресс</div>
      <button class="rstbtn" id="rstB">
        <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.75"/></svg>
        сброс
      </button>
    </div>
    <div class="chcard">
      <div class="chbars">${bars}</div>
      <div class="stdiv"></div>
      <div class="trow">
        <div>
          <div class="tnums"><em>${td}</em>/${tt}</div>
          <div class="tsub">упражнений за цикл</div>
        </div>
        <div class="tring">
          <svg viewBox="0 0 50 50">
            <circle class="trk" cx="25" cy="25" r="21" stroke-dasharray="${rc.toFixed(2)}"/>
            <circle class="trf" cx="25" cy="25" r="21" stroke-dasharray="${rc.toFixed(2)}" stroke-dashoffset="${(rc*(1-tpct/100)).toFixed(2)}"/>
          </svg>
          <div class="trpct">${tpct}%</div>
        </div>
      </div>
    </div>
  </div>
  <footer>tracker · прогресс хранится локально</footer>`;

  const _sc=document.querySelector('.dscroll');
  const _sp=_sc?_sc.scrollLeft:0;
  document.getElementById('app').innerHTML=html;
  requestAnimationFrame(()=>{const s=document.querySelector('.dscroll');if(s)s.scrollLeft=_sp;});

  /* events */
  document.querySelectorAll('.dp').forEach(el=>{
    el.addEventListener('click',()=>{const i=parseInt(el.dataset.i);if(!isNaN(i)){day=i;form=false;hap();render();}});
  });
  document.querySelectorAll('.tgl').forEach(tgl=>{
    tgl.addEventListener('click',e=>{
      e.stopPropagation();
      const di=parseInt(tgl.dataset.di),ei=parseInt(tgl.dataset.ei),k=`${di}_${ei}`,was=pr[k]||false;
      pr[k]=!was;save();
      if(!was){
        hap('m');burst(tgl);
        const p2=prog(),s2=dstat(p2,di);
        setTimeout(()=>toast(s2.d===s2.t?rnd(DONE):rnd(MOT)),100);
        if(s2.d===s2.t)hap('s');
      }else hap('l');
      render();
    });
  });
  document.querySelectorAll('.stbtn').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const k=btn.dataset.k,step=parseFloat(btn.dataset.s);
      const inp=document.querySelector(`.stval[data-k="${k}"]`);
      if(!inp)return;
      let v=parseFloat(inp.value)||0;v=Math.max(0,Math.round((v+step)*10)/10);
      inp.value=v||'';wt[k]=v?String(v):'';save();hap('l');
    });
  });
  document.querySelectorAll('.stval').forEach(inp=>{
    inp.addEventListener('input',()=>{wt[inp.dataset.k]=inp.value.trim();save();});
  });
  document.getElementById('addB')?.addEventListener('click',()=>{form=true;hap();render();setTimeout(()=>document.getElementById('afn')?.focus(),80);});
  document.getElementById('afno')?.addEventListener('click',()=>{form=false;hap();render();});
  document.getElementById('afok')?.addEventListener('click',()=>{
    const n=document.getElementById('afn')?.value.trim(),s=document.getElementById('afs')?.value.trim(),d=document.getElementById('afd')?.value.trim();
    if(!n||!s){toast('заполни название и подходы');return;}
    const k=`d${day}`;if(!cu[k])cu[k]=[];cu[k].push({name:n,sets:s,desc:d||'—'});
    form=false;hap('s');save();render();toast('добавлено.');
  });
  document.getElementById('rstB')?.addEventListener('click',()=>{
    if(confirm('Сбросить весь прогресс?')){pr={};save();hap('m');render();}
  });
  document.getElementById('expB')?.addEventListener('click',()=>{
    const pg=prog();let csv='День,Упражнение,Подходы,Выполнено,Вес(кг)\n';
    pg.forEach((d,di)=>d.exercises.forEach((ex,ei)=>{csv+=`"${d.name}","${ex.name}","${ex.sets}",${pr[`${di}_${ei}`]?'Да':'Нет'},${wt[`${di}_${ei}`]||''}\n`;}));
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download=`tracker_${new Date().toISOString().slice(0,10)}.csv`;a.click();
    toast('экспорт сохранён');hap();
  });
}

async function init(){
  load();
  const sp=document.getElementById('sp'),spl=document.getElementById('splash'),app=document.getElementById('app');
  await new Promise(r=>setTimeout(r,80));sp.classList.add('show');
  await new Promise(r=>setTimeout(r,1650));sp.classList.add('exit');
  await new Promise(r=>setTimeout(r,380));spl.style.opacity='0';
  await new Promise(r=>setTimeout(r,360));spl.style.display='none';
  app.classList.remove('hidden');app.classList.add('in');render();
}
init();
</script>
</body>
</html>
