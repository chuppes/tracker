<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker</title>
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;
  --bg2:#141414;
  --bg3:#1a1a1a;
  --bg4:#222;
  --border:#252525;
  --border2:#333;
  --text:#efefef;
  --text2:#888;
  --text3:#555;
  --accent:#d0d0d0;
  --accent2:#909090;
  --bar-fill:#b0b0b0;
  --bar-empty:#2a2a2a;
  --ring-fill:#c8c8c8;
  --ring-empty:#252525;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding-bottom:3rem}

#splashScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;transition:opacity .4s}
#splashTitle{text-align:center;opacity:0;transform:translateY(16px);transition:opacity .6s,transform .6s}
#splashTitle h1{font-size:clamp(2rem,7vw,3.8rem);font-weight:800;letter-spacing:.05em;color:var(--text);display:flex;align-items:center;justify-content:center;gap:.3em}
#splashTitle h1 i{font-size:inherit;color:var(--accent2)}
#splashTitle p{font-size:.8rem;color:var(--text2);margin-top:.5em;letter-spacing:.05em}
#splashTitle.show{opacity:1;transform:translateY(0)}
#splashTitle.exit{opacity:0;transform:translateY(-16px)}
#mainContent{display:none}
#mainContent.visible{display:block;animation:fadeUp .5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.site-header{text-align:center;padding:28px 16px 14px}
.site-header h1{font-size:1.75rem;font-weight:800;letter-spacing:.04em;color:var(--text);display:flex;align-items:center;justify-content:center;gap:.3em}
.site-header h1 i{font-size:1.6rem;color:var(--accent2)}
.site-header p{font-size:.76rem;color:var(--text2);margin-top:.4em;letter-spacing:.03em}

.top-bar{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;padding:0 16px 20px}
.top-btn{display:flex;align-items:center;gap:6px;padding:7px 18px;background:var(--bg3);border:1px solid var(--border2);border-radius:20px;color:var(--text2);font-size:.77rem;font-family:inherit;cursor:pointer;transition:all .2s}
.top-btn:hover{border-color:var(--accent2);color:var(--text);background:var(--bg4)}
.top-btn i{font-size:14px}

.days-scroll{overflow-x:auto;padding:0 12px 18px;scrollbar-width:none}
.days-scroll::-webkit-scrollbar{display:none}
.days-container{display:flex;gap:8px;justify-content:center;width:max-content;margin:0 auto;padding:0 4px}

.day-chip{display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:transform .15s;user-select:none}
.day-chip:hover{transform:scale(1.07)}
.day-chip-ring-wrap{position:relative;width:68px;height:68px}
.day-chip-ring-wrap svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)}
.day-chip-ring-wrap svg circle{fill:none;stroke-width:3}
.ring-bg{stroke:var(--ring-empty)}
.ring-fg{stroke:var(--ring-fill);stroke-linecap:round;transition:stroke-dashoffset .45s ease}
.day-chip.active .ring-fg{stroke:#fff}
.day-chip-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
.day-chip-icon{font-size:1.35rem;line-height:1}
.day-chip-pct{font-size:.58rem;font-weight:700;color:var(--text2);line-height:1}
.day-chip.active .day-chip-pct{color:#fff}
.day-chip-name{font-size:.63rem;color:var(--text2);margin-top:5px;font-weight:500}
.day-chip.active .day-chip-name{color:var(--text)}

.selected-day-card{margin:0 16px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.selected-day-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--bg3)}
.selected-day-icon{font-size:1.5rem}
.selected-day-title{font-size:.92rem;font-weight:700;flex:1;min-width:0}
.selected-day-stats{font-size:.7rem;color:var(--text2);background:var(--bg4);border:1px solid var(--border2);padding:3px 10px;border-radius:20px;display:flex;align-items:center;gap:4px;white-space:nowrap}
.selected-day-stats i{font-size:12px}

.exercise{display:flex;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);transition:background .15s}
.exercise:last-of-type{border-bottom:none}
.exercise:hover{background:var(--bg3)}
.exercise-check input[type="checkbox"]{appearance:none;-webkit-appearance:none;width:18px;height:18px;min-width:18px;border:1.5px solid var(--border2);background:var(--bg);cursor:pointer;border-radius:4px;position:relative;transition:all .2s;margin-top:2px}
.exercise-check input:hover{border-color:var(--accent2)}
.exercise-check input:checked{background:var(--accent);border-color:var(--accent)}
.exercise-check input:checked::after{content:'';position:absolute;left:5px;top:2px;width:5px;height:9px;border:2px solid #111;border-left:none;border-top:none;transform:rotate(45deg)}
.exercise-content{flex:1;min-width:0}
.exercise-name{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap}
.ex-title{font-size:.82rem;font-weight:600;display:flex;align-items:center;gap:5px;color:var(--text)}
.ex-title i{font-size:13px;color:var(--text3)}
.exercise-sets{font-size:.67rem;background:var(--bg4);color:var(--accent2);border:1px solid var(--border2);padding:2px 9px;border-radius:20px;white-space:nowrap;font-weight:500}
.exercise-desc{font-size:.68rem;color:var(--text3);margin-top:3px}
.exercise-weight{display:flex;align-items:center;gap:5px;margin-top:7px;font-size:.7rem;color:var(--text3)}
.exercise-weight i{font-size:13px}
.weight-input{width:62px;padding:3px 8px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:.7rem;border-radius:6px;outline:none;transition:border-color .2s}
.weight-input:focus{border-color:var(--accent2)}
.weight-input::placeholder{color:var(--text3)}

.add-exercise-btn{display:flex;align-items:center;gap:6px;width:100%;padding:11px 16px;background:transparent;border:none;border-top:1px solid var(--border);color:var(--text3);font-family:inherit;font-size:.74rem;cursor:pointer;transition:color .2s,background .2s}
.add-exercise-btn:hover{color:var(--text2);background:var(--bg3)}
.add-exercise-btn i{font-size:15px}
.add-form{padding:12px 16px;border-top:1px solid var(--border);background:var(--bg3);display:flex;flex-wrap:wrap;gap:8px}
.add-form input{flex:1;min-width:110px;padding:7px 10px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:.78rem;border-radius:8px;outline:none;transition:border-color .2s}
.add-form input:focus{border-color:var(--accent2)}
.add-form input::placeholder{color:var(--text3)}
.confirm-add,.cancel-add{padding:7px 14px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-family:inherit;font-size:.72rem;cursor:pointer;border-radius:8px;transition:all .2s}
.confirm-add:hover{border-color:var(--accent2);color:var(--text);background:var(--bg4)}
.cancel-add:hover{color:var(--text3)}

/* STATS BLOCK — chart + cycle merged */
.stats-block{margin:0 16px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px 18px}
.chart-header{font-size:.78rem;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:6px;margin-bottom:16px}
.chart-header i{font-size:16px}

/* Chart: fixed 100px bar zone, labels below */
.chart-area{display:flex;gap:0;align-items:flex-end}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center}
.chart-bar-zone{
  width:100%;
  height:100px;
  display:flex;
  align-items:flex-end;
  padding:0 4px;
}
.chart-bar{
  width:100%;
  background:var(--bar-empty);
  border-radius:4px 4px 0 0;
  min-height:4px;
  transition:height .4s ease,background .2s;
}
.chart-bar.filled{background:var(--bar-fill)}
.chart-day-label{font-size:.6rem;color:var(--text3);margin-top:7px;text-align:center;white-space:nowrap}
.chart-day-num{font-size:.6rem;color:var(--text3);margin-top:2px;text-align:center}

.stats-divider{height:1px;background:var(--border);margin:16px 0}
.cycle-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.cycle-label{font-size:.82rem;font-weight:600;color:var(--text);display:flex;align-items:center;gap:7px}
.cycle-label i{font-size:16px;color:var(--accent2)}
.reset-btn{display:flex;align-items:center;gap:5px;padding:6px 14px;background:transparent;border:1px solid var(--border2);color:var(--text2);font-family:inherit;font-size:.72rem;cursor:pointer;border-radius:20px;transition:all .2s;white-space:nowrap}
.reset-btn:hover{border-color:var(--accent2);color:var(--text)}
.reset-btn i{font-size:13px}

.site-footer{text-align:center;font-size:.7rem;color:var(--text3);padding:20px 16px 0}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

@media(max-width:480px){
  .day-chip-ring-wrap{width:56px;height:56px}
  .site-header h1{font-size:1.4rem}
  .chart-day-label{font-size:.52rem}
}
</style>
</head>
<body>

<div id="splashScreen">
  <div id="splashTitle">
    <h1><i class='bx bx-dumbbell'></i> Tracker</h1>
    <p>Трекер тренировок · Отмечай подходы · Добавляй упражнения</p>
  </div>
</div>

<div id="mainContent">
  <div id="app"></div>
</div>

<script>
let ambientCtx=null,ambientPlaying=false;
function startAmbient(){
  if(ambientPlaying)return;
  try{
    ambientCtx=new(window.AudioContext||window.webkitAudioContext)();
    const g=ambientCtx.createGain();g.gain.value=0;g.connect(ambientCtx.destination);
    const o1=ambientCtx.createOscillator(),o2=ambientCtx.createOscillator();
    const g1=ambientCtx.createGain(),g2=ambientCtx.createGain();
    o1.type=o2.type='sine';o1.frequency.value=220;o2.frequency.value=329.63;
    g1.gain.value=0.08;g2.gain.value=0.06;
    o1.connect(g1);o2.connect(g2);g1.connect(g);g2.connect(g);
    o1.start();o2.start();
    g.gain.linearRampToValueAtTime(0.12,ambientCtx.currentTime+1.5);
    ambientPlaying=true;
  }catch(e){}
}
function stopAmbient(){
  if(!ambientPlaying||!ambientCtx)return;
  try{ambientCtx.close();ambientCtx=null;ambientPlaying=false;}catch(e){}
}
function playWhoosh(type){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const now=ctx.currentTime,g=ctx.createGain();
    g.connect(ctx.destination);g.gain.value=0.12;
    const o=ctx.createOscillator();o.type='sine';
    if(type==='in'){o.frequency.setValueAtTime(200,now);o.frequency.exponentialRampToValueAtTime(700,now+.35);}
    else{o.frequency.setValueAtTime(700,now);o.frequency.exponentialRampToValueAtTime(200,now+.35);}
    o.connect(g);o.start();
    g.gain.exponentialRampToValueAtTime(0.0001,now+.5);o.stop(now+.5);
    setTimeout(()=>ctx.close(),600);
  }catch(e){}
}

const SK="neon_workout_progress",EK="neon_custom_exercises",WK="exercise_weights",RK="reminder_time";
const baseProgram=[
  {day:"День 1",name:"Грудь + передняя дельта + трицепс",icon:"🔥",exercises:[
    {name:"Жим штанги лёжа (или гантелей)",sets:"4×8–10",desc:"основа массы"},
    {name:"Жим гантелей на наклонной (30°)",sets:"4×10–12",desc:"верх груди"},
    {name:"Отжимания на брусьях (с весом)",sets:"3×макс",desc:"трицепс + низ груди"},
    {name:"Французский жим (EZ-гриф лёжа)",sets:"3×12",desc:"трицепс"},
    {name:"Разгибание на блоке вниз (канат)",sets:"3×15",desc:"добивка трицепса"}
  ]},
  {day:"День 2",name:"Спина + задняя дельта + бицепс + трапеции",icon:"💪",exercises:[
    {name:"Подтягивания широким хватом",sets:"4×8–10",desc:"ширина спины"},
    {name:"Тяга штанги в наклоне (к животу)",sets:"4×10",desc:"толщина спины"},
    {name:"Тяга гантели одной рукой к поясу",sets:"3×12",desc:"нижняя широчайшая"},
    {name:"Махи гантелями в наклоне (задняя дельта)",sets:"3×15",desc:"задний пучок"},
    {name:"Подъём штанги на бицепс стоя",sets:"3×10",desc:"база на бицепс"},
    {name:"Молотки с гантелями",sets:"3×12",desc:"плечо + брахиалис"},
    {name:"Шраги с гантелями (трапеции)",sets:"3×15–20",desc:"верх трапеций"}
  ]},
  {day:"День 3",name:"Отдых / растяжка",icon:"🧘",exercises:[{name:"Растяжка всего тела",sets:"10–15 мин",desc:"восстановление"}]},
  {day:"День 4",name:"Ноги + кор (пресс + поясница)",icon:"🦵",exercises:[
    {name:"Приседания со штангой (умеренный вес)",sets:"4×8",desc:"база ног"},
    {name:"Румынская тяга",sets:"4×10",desc:"бицепс бедра + ягодицы"},
    {name:"Выпады с гантелями",sets:"3×12 на ногу",desc:"координация + объём"},
    {name:"Сгибание ног в тренажёре (лёжа)",sets:"3×12",desc:"изоляция"},
    {name:"Подъёмы на носки стоя",sets:"4×15–20",desc:"икры"},
    {name:"Скручивания на римском стуле",sets:"3×20",desc:"верх пресса"},
    {name:"Боковые скручивания с блином",sets:"3×15 на сторону",desc:"косые"},
    {name:"Гиперэкстензия",sets:"3×15",desc:"поясница"}
  ]},
  {day:"День 5",name:"Плечи + руки + пресс (добивка)",icon:"💎",exercises:[
    {name:"Жим гантелей сидя",sets:"4×10",desc:"передний пучок"},
    {name:"Махи гантелями в стороны",sets:"4×15–20",desc:"средний пучок"},
    {name:"Жим лёжа узким хватом",sets:"3×10",desc:"трицепс"},
    {name:"Молотки на бицепс с супинацией",sets:"3×12",desc:"бицепс"},
    {name:"Планка с касанием плеча",sets:"3×60 сек",desc:"кор"},
    {name:"Вакуум в животе",sets:"5×30 сек",desc:"глубокий пресс"}
  ]},
  {day:"День 6",name:"Полный отдых",icon:"😴",exercises:[{name:"Восстановление",sets:"растяжка",desc:"отдых"}]},
  {day:"День 7",name:"Полный отдых",icon:"🌿",exercises:[{name:"Восстановление",sets:"сон",desc:"отдых"}]}
];

function loadW(){try{return JSON.parse(localStorage.getItem(WK))||{};}catch(e){return{};}}
function saveW(w){localStorage.setItem(WK,JSON.stringify(w));}
function loadC(){try{return JSON.parse(localStorage.getItem(EK))||{};}catch(e){return{};}}
function saveC(c){localStorage.setItem(EK,JSON.stringify(c));}
function loadP(){try{return JSON.parse(localStorage.getItem(SK))||{};}catch(e){return{};}}
function saveP(){localStorage.setItem(SK,JSON.stringify(progress));render();}

let weights=loadW(),customExercises=loadC(),progress=loadP();
let reminderTime=localStorage.getItem(RK)||null;
let currentDayIndex=0;

function getFullProgram(){
  const p=JSON.parse(JSON.stringify(baseProgram));
  for(let i=0;i<p.length;i++){
    const k=`day_${i}`;
    if(customExercises[k]?.length)p[i].exercises.push(...customExercises[k]);
  }
  return p;
}
function toggleEx(d,e){progress[`${d}_${e}`]=!progress[`${d}_${e}`];saveP();}
function resetAll(){if(confirm("Сбросить прогресс?")){progress={};saveP();}}
function addCustom(d,name,sets,desc){
  const k=`day_${d}`;
  if(!customExercises[k])customExercises[k]=[];
  customExercises[k].push({name,sets,desc:desc||"добавленное"});
  saveC(customExercises);render();
}
function updateW(d,e,v){weights[`${d}_${e}`]=v;saveW(weights);}
function setReminder(){
  const t=prompt("Время (ЧЧ:ММ):",reminderTime||"19:00");
  if(t&&/^\d{1,2}:\d{2}$/.test(t)){
    reminderTime=t;localStorage.setItem(RK,t);
    alert(`Напоминание на ${t}`);
    if(Notification.permission==="default")Notification.requestPermission();
  }else if(t)alert("Формат: ЧЧ:ММ");
}
function checkReminder(){
  if(!reminderTime)return;
  const now=new Date();const[h,m]=reminderTime.split(":").map(Number);
  if(now.getHours()===h&&now.getMinutes()===m&&now.getSeconds()<30&&Notification.permission==="granted")
    new Notification("🏋️ Tracker",{body:"Время тренировки! 💪"});
}
setInterval(checkReminder,30000);
function exportProgress(){
  const program=getFullProgram();
  let csv="День,Упражнение,Подходы,Выполнено,Вес(кг)\n";
  for(let d=0;d<program.length;d++)
    program[d].exercises.forEach((ex,e)=>{
      csv+=`${program[d].name},${ex.name},${ex.sets},${progress[`${d}_${e}`]?"Да":"Нет"},${weights[`${d}_${e}`]||""}\n`;
    });
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download=`tracker_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
function esc(s){if(!s)return'';return s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}

function render(){
  const app=document.getElementById("app");
  if(!app)return;
  const program=getFullProgram();

  const dp=program.map((day,di)=>{
    let done=0;
    day.exercises.forEach((_,ei)=>{if(progress[`${di}_${ei}`])done++;});
    return{done,total:day.exercises.length};
  });

  // circumference for r=29
  const circ=2*Math.PI*29;

  let html=`
  <div class="site-header">
    <h1><i class='bx bx-dumbbell'></i> Tracker</h1>
    <p>Трекер тренировок · Отмечай подходы · Добавляй упражнения</p>
  </div>
  <div class="top-bar">
    <button class="top-btn" id="reminderBtn"><i class='bx bx-bell'></i> Напомнить</button>
    <button class="top-btn" id="exportBtn"><i class='bx bx-export'></i> Экспорт</button>
  </div>
  <div class="days-scroll"><div class="days-container">`;

  program.forEach((day,idx)=>{
    const pct=dp[idx].total?dp[idx].done/dp[idx].total:0;
    const offset=circ*(1-pct);
    html+=`<div class="day-chip${idx===currentDayIndex?' active':''}" data-day-index="${idx}">
      <div class="day-chip-ring-wrap">
        <svg viewBox="0 0 68 68" xmlns="http://www.w3.org/2000/svg">
          <circle class="ring-bg" cx="34" cy="34" r="29" stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="0"/>
          <circle class="ring-fg" cx="34" cy="34" r="29" stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}"/>
        </svg>
        <div class="day-chip-inner">
          <div class="day-chip-icon">${day.icon}</div>
          <div class="day-chip-pct">${Math.round(pct*100)}%</div>
        </div>
      </div>
      <div class="day-chip-name">${day.day}</div>
    </div>`;
  });
  html+=`</div></div>`;

  // selected day card
  const sd=program[currentDayIndex];
  const sp=dp[currentDayIndex];
  const sPct=sp.total?Math.round(sp.done/sp.total*100):0;
  let exRows='';
  sd.exercises.forEach((ex,ei)=>{
    const checked=progress[`${currentDayIndex}_${ei}`]||false;
    const wv=weights[`${currentDayIndex}_${ei}`]||'';
    exRows+=`<div class="exercise">
      <div class="exercise-check"><input type="checkbox" data-day="${currentDayIndex}" data-ex="${ei}" ${checked?'checked':''}></div>
      <div class="exercise-content">
        <div class="exercise-name">
          <span class="ex-title"><i class='bx bx-target-lock'></i>${esc(ex.name)}</span>
          <span class="exercise-sets">${esc(ex.sets)}</span>
        </div>
        <div class="exercise-desc">${esc(ex.desc)}</div>
        <div class="exercise-weight"><i class='bx bx-dumbbell'></i> Вес:
          <input type="text" class="weight-input" data-day="${currentDayIndex}" data-ex="${ei}" value="${esc(wv)}" placeholder="кг">
        </div>
      </div>
    </div>`;
  });

  html+=`<div class="selected-day-card">
    <div class="selected-day-header">
      <div class="selected-day-icon">${sd.icon}</div>
      <div class="selected-day-title">${esc(sd.name)}</div>
      <div class="selected-day-stats"><i class='bx bx-check-circle'></i>${sp.done}/${sp.total} · ${sPct}%</div>
    </div>
    ${exRows}
    <button class="add-exercise-btn" data-day-add="${currentDayIndex}"><i class='bx bx-plus-circle'></i> Добавить упражнение</button>
    <div id="addForm_${currentDayIndex}" style="display:none" class="add-form">
      <input type="text" id="exName_${currentDayIndex}" placeholder="Название">
      <input type="text" id="exSets_${currentDayIndex}" placeholder="Подходы">
      <input type="text" id="exDesc_${currentDayIndex}" placeholder="Описание">
      <button class="confirm-add" data-day-confirm="${currentDayIndex}">✓ Добавить</button>
      <button class="cancel-add" data-day-cancel="${currentDayIndex}">✗ Отмена</button>
    </div>
  </div>`;

  // chart + stats
  const weekData=program.map((day,di)=>{
    let done=0;
    day.exercises.forEach((_,ei)=>{if(progress[`${di}_${ei}`])done++;});
    return done;
  });
  const maxVal=Math.max(...weekData,1);
  const totalDone=dp.reduce((s,d)=>s+d.done,0);
  const totalEx=dp.reduce((s,d)=>s+d.total,0);
  const totalPct=totalEx?Math.round(totalDone/totalEx*100):0;

  let chartCols='';
  weekData.forEach((val,idx)=>{
    // bar height in px: 0 → 4px (stub), else scale to 4–92px
    const barH=val===0?4:Math.max(4,Math.round((val/maxVal)*92));
    chartCols+=`<div class="chart-col">
      <div class="chart-bar-zone">
        <div class="chart-bar${val>0?' filled':''}" style="height:${barH}px"></div>
      </div>
<div class="chart-day-label">День ${idx+1}</div>
<div class="chart-day-num">${val}/${dp[idx].total}</div>
    </div>`;
  });

  html+=`<div class="stats-block">
    <div class="chart-header"><i class='bx bx-line-chart'></i> Прогресс за неделю</div>
    <div class="chart-area">${chartCols}</div>
    <div class="stats-divider"></div>
    <div class="cycle-row">
      <div class="cycle-label"><i class='bx bx-trophy'></i> Прогресс цикла: ${totalDone}/${totalEx} (${totalPct}%)</div>
      <button class="reset-btn" id="resetAllBtn"><i class='bx bx-refresh'></i> Сбросить всё</button>
    </div>
  </div>
  <div class="site-footer">Твой прогресс сохраняется · Сделано с ♥</div>`;

  app.innerHTML=html;

  document.querySelectorAll('.day-chip').forEach(chip=>{
    chip.addEventListener('click',()=>{
      const idx=parseInt(chip.dataset.dayIndex);
      if(!isNaN(idx)){currentDayIndex=idx;render();}
    });
  });
  document.querySelectorAll('input[type="checkbox"]').forEach(cb=>{
    cb.addEventListener('change',()=>toggleEx(parseInt(cb.dataset.day),parseInt(cb.dataset.ex)));
  });
  document.querySelectorAll('.weight-input').forEach(inp=>{
    inp.addEventListener('change',()=>updateW(parseInt(inp.dataset.day),parseInt(inp.dataset.ex),inp.value));
  });
  document.querySelectorAll('.add-exercise-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{document.getElementById(`addForm_${btn.dataset.dayAdd}`).style.display='flex';});
  });
  document.querySelectorAll('.confirm-add').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const i=btn.dataset.dayConfirm;
      const name=document.getElementById(`exName_${i}`)?.value.trim();
      const sets=document.getElementById(`exSets_${i}`)?.value.trim();
      const desc=document.getElementById(`exDesc_${i}`)?.value.trim();
      if(name&&sets)addCustom(parseInt(i),name,sets,desc);
      else alert("Заполни название и подходы");
      document.getElementById(`addForm_${i}`).style.display='none';
    });
  });
  document.querySelectorAll('.cancel-add').forEach(btn=>{
    btn.addEventListener('click',()=>{document.getElementById(`addForm_${btn.dataset.dayCancel}`).style.display='none';});
  });
  document.getElementById('resetAllBtn')?.addEventListener('click',resetAll);
  document.getElementById('reminderBtn')?.addEventListener('click',setReminder);
  document.getElementById('exportBtn')?.addEventListener('click',exportProgress);
}

const splashScreen=document.getElementById('splashScreen');
const splashTitle=document.getElementById('splashTitle');
const mainContent=document.getElementById('mainContent');

async function startSplash(){
  startAmbient();
  splashTitle.classList.add('show');
  playWhoosh('in');
  await new Promise(r=>setTimeout(r,2000));
  splashTitle.classList.add('exit');
  playWhoosh('out');
  stopAmbient();
  await new Promise(r=>setTimeout(r,600));
  splashScreen.style.opacity='0';
  await new Promise(r=>setTimeout(r,400));
  splashScreen.style.display='none';
  mainContent.classList.add('visible');
  render();
}
startSplash();
</script>
</body>
</html>
