<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#080808;
  --s1:#0f0f0e;
  --s2:#141412;
  --s3:#1a1916;
  --s4:#201e1a;

  --bd:rgba(255,248,235,0.055);
  --bd2:rgba(255,248,235,0.09);
  --bd3:rgba(255,248,235,0.14);

  --t1:#ede8e0;
  --t2:rgba(237,232,224,0.46);
  --t3:rgba(237,232,224,0.24);
  --t4:rgba(237,232,224,0.08);

  /* sage accent — muted warm green */
  --a:#95b88d;
  --a2:#7da275;
  --a-dim:rgba(149,184,141,0.08);
  --a-glow:rgba(149,184,141,0.18);
  --a-ring:rgba(149,184,141,0.26);

  /* glass layer tokens */
  --glass-bg:rgba(22,21,18,0.62);
  --glass-border:rgba(255,248,235,0.08);
  --glass-shine:rgba(255,248,235,0.055);
  --glass-deep:rgba(10,10,8,0.45);

  --sand:#b0a082;
  --danger:#b07070;

  --r:20px;
  --r-sm:14px;
  --r-xs:10px;

  --font:'Geist',system-ui,sans-serif;
  --mono:'DM Mono',monospace;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}

html{height:100%;background:var(--bg)}
body{
  background:var(--bg);
  color:var(--t1);
  font-family:var(--font);
  min-height:100dvh;
  overflow-x:hidden;
  padding-bottom:calc(88px + var(--safe-b));
  -webkit-font-smoothing:antialiased;
}

/* atmospheric background */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 50% at 15% -5%, rgba(149,184,141,0.035) 0%,transparent 65%),
    radial-gradient(ellipse 50% 40% at 85% 100%, rgba(176,160,130,0.025) 0%,transparent 65%),
    radial-gradient(ellipse 40% 60% at 50% 50%, rgba(255,248,235,0.008) 0%,transparent 80%);
}

/* subtle grain for depth */
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  background-size:128px 128px;
}

/* ── SPLASH ── */
#splash{
  position:fixed;inset:0;background:#080808;
  display:flex;align-items:center;justify-content:center;
  z-index:1000;transition:opacity 0.4s ease;
}
.sp{
  text-align:center;opacity:0;transform:translateY(18px);
  transition:opacity 0.65s cubic-bezier(0.22,1,0.36,1),transform 0.65s cubic-bezier(0.22,1,0.36,1);
  position:relative;
}
.sp.show{opacity:1;transform:none}
.sp.exit{opacity:0;transform:translateY(-12px);transition-duration:0.3s}

/* жидкая стеклянная плашка */
.sp::before{
  content:'';
  position:absolute;inset:-18px -24px;
  background:rgba(18,17,14,0.55);
  border:1px solid rgba(255,248,235,0.07);
  border-radius:22px;
  backdrop-filter:blur(18px) saturate(1.2);
  -webkit-backdrop-filter:blur(18px) saturate(1.2);
  box-shadow:
    0 1px 0 rgba(255,248,235,0.06) inset,
    0 8px 32px rgba(0,0,0,0.4),
    0 0 0 1px rgba(255,248,235,0.03);
  z-index:-1;
  opacity:0;
  transition:opacity 0.6s cubic-bezier(0.22,1,0.36,1) 0.25s;
}
.sp.show::before{opacity:1}

.sp-logo{
  font-family:var(--font);font-size:2.2rem;font-weight:300;
  letter-spacing:0.28em;color:var(--t1);text-transform:lowercase;
  position:relative;display:inline-block;
}
.sp-rule{
  width:18px;height:1px;background:var(--t3);
  margin:16px auto;
  transform:scaleX(0);transform-origin:left center;
  transition:transform 1s cubic-bezier(0.22,1,0.36,1) 0.28s;
}
.sp.show .sp-rule{transform:scaleX(1)}
.sp-sub{font-family:var(--mono);font-size:0.55rem;color:var(--t3);letter-spacing:0.22em;text-transform:uppercase}

/* ── SHELL ── */
#app{position:relative;z-index:1}
#app.hidden{display:none}
#app.in{animation:ap 0.55s cubic-bezier(0.22,1,0.36,1) both}
@keyframes ap{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* ── HEADER ── glass, airy ── */
.hdr{
  padding:calc(var(--safe-t) + 52px) 20px 16px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:10;
  background:rgba(8,8,8,0.55);
  backdrop-filter:blur(20px) saturate(1.4);
  -webkit-backdrop-filter:blur(20px) saturate(1.4);
  border-bottom:1px solid rgba(255,248,235,0.04);
  box-shadow:inset 0 1px 0 rgba(255,248,235,0.04);
}
.hdr-eye{font-family:var(--mono);font-size:0.54rem;color:var(--t3);letter-spacing:0.18em;text-transform:uppercase;margin-bottom:4px}
.hdr-title{
  font-size:1.5rem;font-weight:600;letter-spacing:-0.025em;line-height:1;color:var(--t1);
  display:flex;align-items:center;gap:7px;
}
.pulse{
  display:inline-block;width:5px;height:5px;border-radius:50%;
  background:var(--a);
  animation:pulse-a 2.6s ease-in-out infinite;
}
@keyframes pulse-a{
  0%,100%{box-shadow:0 0 0 0 var(--a-ring);opacity:1}
  50%{box-shadow:0 0 0 5px rgba(149,184,141,0);opacity:0.6}
}
.hdr-actions{display:flex;gap:6px}
.ic{
  width:34px;height:34px;border-radius:var(--r-xs);
  background:rgba(255,248,235,0.04);
  border:1px solid rgba(255,248,235,0.07);
  color:var(--t2);display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  transition:background 0.18s,border-color 0.18s,color 0.18s,transform 0.13s cubic-bezier(0.34,1.56,0.64,1);
  -webkit-user-select:none;user-select:none;
}
.ic:hover{background:rgba(255,248,235,0.07);border-color:rgba(255,248,235,0.11);color:var(--t1)}
.ic:active{transform:scale(0.84)}
.ic svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}

/* ── STREAK ── glass card ── */
.streak{
  margin:14px 16px 14px;padding:14px 16px;
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  border-radius:var(--r);
  display:flex;align-items:center;gap:13px;
  position:relative;overflow:hidden;
  backdrop-filter:blur(16px) saturate(1.3);
  -webkit-backdrop-filter:blur(16px) saturate(1.3);
  box-shadow:0 1px 0 rgba(255,248,235,0.055) inset, 0 8px 32px rgba(0,0,0,0.28);
}
.streak::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 8%,rgba(149,184,141,0.28) 50%,transparent 92%);
}
.streak::after{
  content:'';position:absolute;top:-30px;left:50%;transform:translateX(-50%);
  width:80%;height:60px;
  background:radial-gradient(ellipse,rgba(149,184,141,0.07) 0%,transparent 70%);
  pointer-events:none;
}
.st-icon{font-size:1.35rem;flex-shrink:0;animation:bth 3.5s ease-in-out infinite}
@keyframes bth{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.st-count{font-size:1.05rem;font-weight:600;color:var(--a);line-height:1;letter-spacing:-0.01em}
.st-lbl{font-size:0.64rem;color:var(--t2);margin-top:2px;letter-spacing:0.02em}
.st-bar{flex:1;height:2px;background:var(--t4);border-radius:2px;overflow:hidden}
.st-fill{height:100%;background:linear-gradient(90deg,var(--a2),var(--a));border-radius:2px;transition:width 1.2s cubic-bezier(0.22,1,0.36,1)}

/* ── DAYS ── */
.sec-lbl{font-family:var(--mono);font-size:0.53rem;color:var(--t3);letter-spacing:0.2em;text-transform:uppercase;padding:0 20px;margin-bottom:10px}
.dscroll{overflow-x:auto;padding:0 16px 4px;scrollbar-width:none}
.dscroll::-webkit-scrollbar{display:none}
.drow{display:flex;gap:7px;width:max-content;padding:2px 2px}

.dp{
  display:flex;flex-direction:column;align-items:center;cursor:pointer;
  -webkit-user-select:none;user-select:none;
  transition:transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
}
.dp:active{transform:scale(0.85)}
.dp-ring{position:relative;width:56px;height:56px}
.dp-ring svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)}
.dp-ring circle{fill:none;stroke-width:2}
.rt{stroke:var(--t4)}
.rp{stroke:var(--t3);stroke-linecap:round;transition:stroke-dashoffset 0.7s cubic-bezier(0.22,1,0.36,1),stroke 0.25s}
.dp.act .rp{stroke:var(--a)}
.dp.dn .rp{stroke:var(--a2)}

.dp-bg{
  position:absolute;inset:5px;border-radius:50%;
  background:transparent;
  transition:background 0.25s,box-shadow 0.25s;
}
.dp.act .dp-bg{
  background:rgba(149,184,141,0.07);
  box-shadow:inset 0 0 0 1px rgba(149,184,141,0.2), 0 0 12px rgba(149,184,141,0.12);
}
.dp-face{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
.dp-em{font-size:1.05rem;line-height:1}
.dp-pct{font-family:var(--mono);font-size:0.48rem;font-weight:500;color:var(--t3);line-height:1;margin-top:2px;transition:color 0.2s}
.dp.act .dp-pct{color:var(--a)}
.dp.dn .dp-pct{color:var(--a2)}
.dp-nm{font-size:0.53rem;color:var(--t3);margin-top:5px;font-weight:500;transition:color 0.2s;letter-spacing:0.02em}
.dp.act .dp-nm{color:var(--t2)}

/* ── DAY CARD — main glass element ── */
.dcard{
  margin:14px 16px 0;
  border-radius:var(--r);
  overflow:hidden;
  position:relative;
  background:
    linear-gradient(160deg, rgba(255,248,235,0.04) 0%, transparent 60%),
    var(--glass-bg);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(24px) saturate(1.35);
  -webkit-backdrop-filter:blur(24px) saturate(1.35);
  box-shadow:
    0 1px 0 rgba(255,248,235,0.07) inset,
    0 -1px 0 rgba(0,0,0,0.35) inset,
    0 12px 40px rgba(0,0,0,0.38),
    0 2px 8px rgba(0,0,0,0.22);
  transform:translateZ(0);
}

.dcard::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 5%,rgba(255,248,235,0.1) 40%,rgba(255,248,235,0.06) 60%,transparent 95%);
  z-index:1;pointer-events:none;
}
.dcard::after{
  content:'';position:absolute;top:-40px;right:-30px;width:120px;height:120px;
  background:radial-gradient(circle,rgba(149,184,141,0.07) 0%,transparent 65%);
  pointer-events:none;z-index:0;
}

.dhdr{
  padding:17px 18px 14px;
  border-bottom:1px solid rgba(255,248,235,0.055);
  position:relative;z-index:1;
  background:rgba(255,255,255,0.012);
}
.dmeta{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.dicon{
  width:30px;height:30px;font-size:0.95rem;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,248,235,0.05);
  border:1px solid rgba(255,248,235,0.07);
  border-radius:var(--r-xs);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
.dtag{
  font-family:var(--mono);font-size:0.51rem;color:var(--t3);
  letter-spacing:0.1em;text-transform:uppercase;
  background:rgba(255,248,235,0.04);
  border:1px solid rgba(255,248,235,0.07);
  padding:2px 9px;border-radius:20px;
}
.dname{font-size:0.88rem;font-weight:600;letter-spacing:-0.01em;line-height:1.3;color:var(--t1)}
.dprow{display:flex;align-items:center;gap:10px;margin-top:10px}
.dptrack{flex:1;height:2px;background:var(--t4);border-radius:2px;overflow:hidden}
.dpfill{height:100%;background:linear-gradient(90deg,var(--a2),var(--a));border-radius:2px;transition:width 0.6s cubic-bezier(0.22,1,0.36,1)}
.dppct{font-family:var(--mono);font-size:0.57rem;color:var(--a);font-weight:500;min-width:34px;text-align:right}

/* ── EXERCISE ROW ── */
.ex{
  display:flex;gap:12px;padding:13px 18px;
  border-bottom:1px solid rgba(255,248,235,0.04);
  transition:background 0.18s;
  position:relative;z-index:1;
}
.ex:last-of-type{border-bottom:none}
.ex:active{background:rgba(255,248,235,0.018)}
.ex.dn{background:rgba(149,184,141,0.025)}
.ex.dn::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:2px;
  background:linear-gradient(180deg,var(--a2),var(--a));
  border-radius:0 1px 1px 0;
}

/* toggle — iOS-like */
.tgl{
  margin-top:2px;flex-shrink:0;width:22px;height:22px;border-radius:8px;
  border:1.5px solid rgba(255,248,235,0.1);background:rgba(255,248,235,0.03);
  position:relative;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.25s cubic-bezier(0.34,1.56,0.64,1),border-color 0.22s,box-shadow 0.22s,transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
}
.tgl::after{
  content:'';position:absolute;
  width:7px;height:4.5px;
  border-left:1.7px solid transparent;border-bottom:1.7px solid transparent;
  transform:rotate(-47deg) translate(1px,-0.5px);transition:border-color 0.15s;
}
.tgl.on{
  background:var(--a2);border-color:transparent;
  box-shadow:0 0 0 3px rgba(149,184,141,0.12), 0 2px 8px rgba(149,184,141,0.25);
}
.tgl.on::after{border-color:rgba(8,8,8,0.8)}
.tgl:active{transform:scale(0.78)}

.exb{flex:1;min-width:0}
.exr1{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.exnm{font-size:0.82rem;font-weight:500;line-height:1.3;color:var(--t1);transition:color 0.2s}
.ex.dn .exnm{color:var(--t3);text-decoration:line-through;text-decoration-color:var(--t4)}
.exsets{
  font-family:var(--mono);font-size:0.53rem;color:var(--t2);
  background:rgba(255,248,235,0.04);
  border:1px solid rgba(255,248,235,0.07);
  padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;letter-spacing:0.04em;
}
.exdsc{font-size:0.67rem;color:var(--t3);margin-top:2px;line-height:1.4}
.exwt{display:flex;align-items:center;gap:8px;margin-top:9px}
.wtlbl{font-family:var(--mono);font-size:0.53rem;color:var(--t3);letter-spacing:0.1em}
.stepper{
  display:flex;align-items:center;
  background:rgba(255,248,235,0.03);
  border:1px solid rgba(255,248,235,0.07);
  border-radius:var(--r-xs);overflow:hidden;
}
.stbtn{
  width:30px;height:28px;background:transparent;border:none;
  color:var(--t2);font-family:var(--font);font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:background 0.14s,color 0.14s,transform 0.11s;
  -webkit-user-select:none;user-select:none;
}
.stbtn:hover{background:rgba(255,248,235,0.05);color:var(--t1)}
.stbtn:active{transform:scale(0.78)}
.stval{font-family:var(--mono);font-size:0.68rem;font-weight:500;color:var(--t1);min-width:38px;text-align:center;background:transparent;border:none;outline:none;padding:0 2px}
.stval::placeholder{color:var(--t3)}
.stunit{font-family:var(--mono);font-size:0.53rem;color:var(--t3);padding-right:8px}

/* ── ADD FORM ── */
.addbtn{
  display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:12px;
  background:transparent;border:none;border-top:1px solid rgba(255,248,235,0.045);
  color:var(--t3);font-family:var(--font);font-size:0.74rem;cursor:pointer;
  transition:color 0.18s,background 0.18s;
  position:relative;z-index:1;
}
.addbtn:hover{color:var(--a);background:rgba(149,184,141,0.04)}
.addbtn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.addform{
  border-top:1px solid rgba(255,248,235,0.045);
  background:rgba(255,248,235,0.018);
  padding:14px 18px;display:none;flex-direction:column;gap:9px;
  position:relative;z-index:1;
}
.addform.open{display:flex;animation:sld 0.28s cubic-bezier(0.22,1,0.36,1) both}
@keyframes sld{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.afi{
  width:100%;padding:9px 12px;
  background:rgba(255,248,235,0.04);
  border:1px solid rgba(255,248,235,0.08);
  color:var(--t1);font-family:var(--font);font-size:0.76rem;
  border-radius:var(--r-xs);outline:none;
  transition:border-color 0.18s,box-shadow 0.18s,background 0.18s;
}
.afi:focus{border-color:rgba(149,184,141,0.5);box-shadow:0 0 0 3px rgba(149,184,141,0.08);background:rgba(255,248,235,0.06)}
.afi::placeholder{color:var(--t3)}
.afrow{display:flex;gap:7px}
.afrow .afi{flex:1}
.afacts{display:flex;gap:7px}
.afok{
  flex:1;padding:10px;
  background:var(--a2);border:none;color:rgba(8,8,8,0.88);
  font-family:var(--font);font-size:0.76rem;font-weight:600;
  border-radius:var(--r-xs);cursor:pointer;
  transition:background 0.18s,box-shadow 0.18s,transform 0.14s;
}
.afok:hover{background:var(--a);box-shadow:0 4px 16px rgba(149,184,141,0.25)}
.afok:active{transform:scale(0.95)}
.afno{
  padding:10px 14px;background:rgba(255,248,235,0.04);
  border:1px solid rgba(255,248,235,0.08);color:var(--t2);
  font-family:var(--font);font-size:0.76rem;
  border-radius:var(--r-xs);cursor:pointer;transition:all 0.18s;
}
.afno:hover{color:var(--t1);background:rgba(255,248,235,0.07)}

/* ── STATS ── */
.stats{margin:14px 16px 0}
.sthd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.stlb{font-family:var(--mono);font-size:0.53rem;color:var(--t3);letter-spacing:0.2em;text-transform:uppercase}
.rstbtn{
  display:flex;align-items:center;gap:4px;
  padding:4px 11px;background:transparent;
  border:1px solid rgba(255,248,235,0.07);
  color:var(--t3);font-family:var(--mono);font-size:0.52rem;letter-spacing:0.06em;
  border-radius:20px;cursor:pointer;transition:all 0.18s;
}
.rstbtn svg{width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.rstbtn:hover{border-color:var(--danger);color:var(--danger)}

.chcard{
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  border-radius:var(--r);padding:16px;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  box-shadow:0 1px 0 rgba(255,248,235,0.055) inset, 0 8px 28px rgba(0,0,0,0.28);
  position:relative;overflow:hidden;
}
.chcard::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 8%,rgba(255,248,235,0.07) 50%,transparent 92%);
}
.chbars{display:flex;gap:5px;align-items:flex-end;height:68px}
.chcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.chbw{flex:1;width:100%;display:flex;align-items:flex-end}
.chb{
  width:100%;min-height:3px;
  background:rgba(255,248,235,0.04);
  border-radius:3px 3px 0 0;
  position:relative;overflow:hidden;
  transition:height 0.55s cubic-bezier(0.22,1,0.36,1);
}
.chb.f::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,var(--a) 0%,rgba(125,162,117,0.4) 100%);border-radius:inherit}
.chb.c{box-shadow:0 0 0 1px rgba(149,184,141,0.3)}
.chb.c::after{background:linear-gradient(180deg,var(--a) 0%,var(--a2) 100%)}
.chlb{font-family:var(--mono);font-size:0.46rem;color:var(--t3);text-align:center;line-height:1.3}
.chlb b{display:block;color:var(--t2);font-weight:500}
.stdiv{height:1px;background:rgba(255,248,235,0.055);margin:14px 0}
.trow{display:flex;align-items:center;justify-content:space-between;gap:12px}
.tnums{
  font-size:1.4rem;font-weight:600;letter-spacing:-0.02em;
  color:var(--t1);line-height:1;
  transition:opacity 0.15s ease;
}
.tnums em{color:var(--a);font-style:normal}
.tsub{font-size:0.64rem;color:var(--t2);margin-top:4px}
.tring{width:50px;height:50px;flex-shrink:0;position:relative}
.tring svg{transform:rotate(-90deg);width:100%;height:100%}
.trk{fill:none;stroke:var(--t4);stroke-width:3.5}
.trf{fill:none;stroke:var(--a);stroke-width:3.5;stroke-linecap:round;transition:stroke-dashoffset 0.9s cubic-bezier(0.22,1,0.36,1)}
.trpct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:0.55rem;font-weight:500;color:var(--a)}

/* ── TOAST — glass pill ── */
.toast{
  position:fixed;bottom:calc(76px + var(--safe-b));left:50%;
  transform:translateX(-50%) translateY(12px);
  background:rgba(30,28,24,0.82);
  border:1px solid rgba(255,248,235,0.1);
  border-radius:100px;
  padding:9px 18px;font-size:0.72rem;color:var(--t1);white-space:nowrap;
  box-shadow:0 1px 0 rgba(255,248,235,0.08) inset, 0 10px 40px rgba(0,0,0,0.55);
  z-index:500;opacity:0;pointer-events:none;
  backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);
  transition:opacity 0.26s cubic-bezier(0.22,1,0.36,1),transform 0.26s cubic-bezier(0.22,1,0.36,1);
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── BURST ── */
@keyframes br{0%{transform:scale(0.5);opacity:0.85}100%{transform:scale(2.4);opacity:0}}
.bst{position:fixed;border-radius:50%;border:1.5px solid var(--a);animation:br 0.45s cubic-bezier(0.22,1,0.36,1) forwards;pointer-events:none;z-index:999}
@keyframes cpt{0%{opacity:1}100%{opacity:0;transform:translate(var(--tx),var(--ty)) rotate(180deg)}}
.cpt{position:fixed;width:4px;height:4px;border-radius:1px;animation:cpt 0.65s cubic-bezier(0.22,1,0.36,1) forwards;pointer-events:none;z-index:999}

footer{text-align:center;font-family:var(--mono);font-size:0.51rem;color:var(--t3);letter-spacing:0.14em;padding:16px 16px 6px}
</style>
</head>
<body>

<div id="splash">
  <div class="sp" id="sp">
    <div class="sp-logo">tracker</div>
    <div class="sp-rule"></div>
    <div class="sp-sub">тренировки · прогресс</div>
  </div>
</div>

<div id="app" class="hidden"></div>
<div class="toast" id="toast"></div>

<script>
const SK='trk_p3',EK='trk_c3',WK='trk_w3',STK='trk_s3';

const BASE=[
  {day:'День 1',name:'Грудь · Передняя дельта · Трицепс',icon:'🔥',exercises:[
    {name:'Жим штанги лёжа',sets:'4×8–10',desc:'Основа массы груди'},
    {name:'Жим гантелей на наклонной 30°',sets:'4×10–12',desc:'Верх груди'},
    {name:'Отжимания на брусьях с весом',sets:'3×макс',desc:'Трицепс + низ груди'},
    {name:'Французский жим EZ-гриф',sets:'3×12',desc:'Трицепс изоляция'},
    {name:'Разгибание на блоке (канат)',sets:'3×15',desc:'Добивка трицепса'}
  ]},
  {day:'День 2',name:'Спина · Задняя дельта · Бицепс',icon:'💪',exercises:[
    {name:'Подтягивания широким хватом',sets:'4×8–10',desc:'Ширина спины'},
    {name:'Тяга штанги в наклоне',sets:'4×10',desc:'Толщина спины'},
    {name:'Тяга гантели одной рукой',sets:'3×12',desc:'Нижняя широчайшая'},
    {name:'Махи гантелями в наклоне',sets:'3×15',desc:'Задний пучок дельты'},
    {name:'Подъём штанги на бицепс',sets:'3×10',desc:'База на бицепс'},
    {name:'Молотки с гантелями',sets:'3×12',desc:'Плечо + брахиалис'},
    {name:'Шраги с гантелями',sets:'3×15–20',desc:'Верх трапеций'}
  ]},
  {day:'День 3',name:'Отдых · Растяжка',icon:'🧘',exercises:[
    {name:'Растяжка всего тела',sets:'10–15 мин',desc:'Восстановление и мобильность'}
  ]},
  {day:'День 4',name:'Ноги · Пресс · Поясница',icon:'🦵',exercises:[
    {name:'Приседания со штангой',sets:'4×8',desc:'База ног'},
    {name:'Румынская тяга',sets:'4×10',desc:'Бицепс бедра + ягодицы'},
    {name:'Выпады с гантелями',sets:'3×12/н',desc:'Координация + объём'},
    {name:'Сгибание ног в тренажёре',sets:'3×12',desc:'Изоляция'},
    {name:'Подъёмы на носки стоя',sets:'4×15–20',desc:'Икры'},
    {name:'Скручивания на римском стуле',sets:'3×20',desc:'Верх пресса'},
    {name:'Боковые скручивания с блином',sets:'3×15/ст',desc:'Косые'},
    {name:'Гиперэкстензия',sets:'3×15',desc:'Поясница'}
  ]},
  {day:'День 5',name:'Плечи · Руки · Пресс',icon:'💎',exercises:[
    {name:'Жим гантелей сидя',sets:'4×10',desc:'Передний пучок'},
    {name:'Махи гантелями в стороны',sets:'4×15–20',desc:'Средний пучок'},
    {name:'Жим лёжа узким хватом',sets:'3×10',desc:'Трицепс'},
    {name:'Молотки с супинацией',sets:'3×12',desc:'Бицепс'},
    {name:'Планка с касанием плеча',sets:'3×60 сек',desc:'Стабилизация кора'},
    {name:'Вакуум в животе',sets:'5×30 сек',desc:'Глубокий пресс'}
  ]},
  {day:'День 6',name:'Полный отдых',icon:'😴',exercises:[
    {name:'Восстановление',sets:'растяжка',desc:'Дай телу отдохнуть'}
  ]},
  {day:'День 7',name:'Полный отдых',icon:'🌿',exercises:[
    {name:'Восстановление',sets:'сон',desc:'Сон — лучший анаболик'}
  ]}
];

const MOT=['+ 1 к силе.','готово.','зачёт.','сделано.','работа идёт.','по плану.','держишь.','ещё один.'];
const DONE=['день закрыт. хорошая работа.','сотня процентов.','всё сделано.','отличный день.'];
const rnd=a=>a[Math.floor(Math.random()*a.length)];

let wt={},cu={},pr={},stk=0,day=0,form=false;

function load(){
  try{wt=JSON.parse(localStorage.getItem(WK))||{}}catch{wt={}}
  try{cu=JSON.parse(localStorage.getItem(EK))||{}}catch{cu={}}
  try{pr=JSON.parse(localStorage.getItem(SK))||{}}catch{pr={}}
try{stk=parseInt(localStorage.getItem(STK))||0}catch{stk=0}
day=(new Date().getDay()+6)%7;

}
function save(){
  localStorage.setItem(WK,JSON.stringify(wt));
  localStorage.setItem(EK,JSON.stringify(cu));
  localStorage.setItem(SK,JSON.stringify(pr));
  localStorage.setItem(STK,String(stk));
}

function prog(){
  const p=JSON.parse(JSON.stringify(BASE));
  for(let i=0;i<p.length;i++){const k=`d${i}`;if(cu[k]?.length)p[i].exercises.push(...cu[k]);}
  return p;
}
function dstat(p,i){let d=0;p[i].exercises.forEach((_,e)=>{if(pr[`${i}_${e}`])d++;});return{d,t:p[i].exercises.length};}

let _tt;
function toast(m){const el=document.getElementById('toast');if(!el)return;el.textContent=m;el.classList.add('on');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('on'),2100);}

function burst(el){
  const r=el.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;
  const b=document.createElement('div');b.className='bst';
  b.style.cssText=`left:${cx-16}px;top:${cy-16}px;width:32px;height:32px`;
  document.body.appendChild(b);setTimeout(()=>b.remove(),500);
  ['#95b88d','#b0a082','#ede8e0','#7da275'].forEach((c,i)=>{
    const p=document.createElement('div');p.className='cpt';
    const a=(i/4)*Math.PI*2,d=20+Math.random()*14;
    p.style.cssText=`left:${cx-2}px;top:${cy-2}px;background:${c};--tx:${(Math.cos(a)*d).toFixed(0)}px;--ty:${(Math.sin(a)*d).toFixed(0)}px`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),700);
  });
}

function hap(t='l'){if(!navigator.vibrate)return;if(t==='l')navigator.vibrate(7);else if(t==='m')navigator.vibrate([10,5,10]);else if(t==='s')navigator.vibrate([8,4,8,4,14]);}

function esc(s){if(!s)return'';return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

function render(){
  const p=prog(),st=p.map((_,i)=>dstat(p,i));
  const td=st.reduce((s,x)=>s+x.d,0),tt=st.reduce((s,x)=>s+x.t,0);
  const tpct=tt?Math.round(td/tt*100):0;
 const dc=2*Math.PI*24, rc=2*Math.PI*21;
  const h=new Date().getHours();
  const realDay=(new Date().getDay()+6)%7; // 0=пн, 1=вт, ..., 6=вс

  let cs=0;
  for(let i=realDay;i>=0;i--){
    if(st[i].d===st[i].t&&st[i].t>0) cs++;
    else break;
  }
  if(cs!==stk){stk=cs;save();}
  const gr=h<6?'ночная сессия':h<12?'доброе утро':h<18?'добрый день':'добрый вечер';

  let html=`
  <div class="hdr">
    <div>
      <div class="hdr-eye">${gr}</div>
      <div class="hdr-title">tracker <span class="pulse"></span></div>
    </div>
    <div class="hdr-actions">
      <div class="ic" id="expB" title="Экспорт CSV">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </div>
    </div>
  </div>

  <div class="streak">
    <div class="st-icon">${stk>0?'🔥':'·'}</div>
    <div><div class="st-count">${stk} ${stk===1?'день':stk<5?'дня':'дней'}</div><div class="st-lbl">подряд · серия</div></div>
    <div class="st-bar"><div class="st-fill" style="width:${Math.min(stk/7,1)*100}%"></div></div>
  </div>

  <div class="sec-lbl">Неделя</div>
  <div class="dscroll"><div class="drow">`;

  p.forEach((d,i)=>{
    const s=st[i],pct=s.t?s.d/s.t:0,off=(dc*(1-pct)).toFixed(2),dn=s.d===s.t&&s.t>0;
    html+=`<div class="dp${i===day?' act':''}${dn?' dn':''}" data-i="${i}">
      <div class="dp-ring">
        <div class="dp-bg"></div>
        <svg viewBox="0 0 56 56">
          <circle class="rt" cx="28" cy="28" r="24" stroke-dasharray="${dc.toFixed(2)}"/>
          <circle class="rp" cx="28" cy="28" r="24" stroke-dasharray="${dc.toFixed(2)}" stroke-dashoffset="${off}"/>
        </svg>
        <div class="dp-face"><div class="dp-em">${d.icon}</div><div class="dp-pct">${Math.round(pct*100)}%</div></div>
      </div>
      <div class="dp-nm">${d.day.replace('День ','Д')}</div>
    </div>`;
  });
  html+=`</div></div>`;

  const cd=p[day],cs2=st[day],cpct=cs2.t?Math.round(cs2.d/cs2.t*100):0;
  let exs='';
  cd.exercises.forEach((ex,ei)=>{
    const k=`${day}_${ei}`,on=pr[k]||false,wv=parseFloat(wt[k])||0;
    exs+=`<div class="ex${on?' dn':''}">
      <div class="tgl${on?' on':''}" data-di="${day}" data-ei="${ei}"></div>
      <div class="exb">
        <div class="exr1"><span class="exnm">${esc(ex.name)}</span><span class="exsets">${esc(ex.sets)}</span></div>
        <div class="exdsc">${esc(ex.desc)}</div>
        <div class="exwt">
          <span class="wtlbl">кг</span>
          <div class="stepper">
            <button class="stbtn" data-k="${k}" data-s="-2.5">−</button>
            <input class="stval" type="text" inputmode="decimal" value="${wv||''}" placeholder="—" data-k="${k}">
            <span class="stunit">кг</span>
            <button class="stbtn" data-k="${k}" data-s="2.5">+</button>
          </div>
        </div>
      </div>
    </div>`;
  });

  exs+=`
  <button class="addbtn" id="addB">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    добавить упражнение
  </button>
  <div class="addform${form?' open':''}" id="addF">
    <input class="afi" id="afn" type="text" placeholder="Название упражнения" autocomplete="off">
    <div class="afrow">
      <input class="afi" id="afs" type="text" placeholder="Подходы" autocomplete="off">
      <input class="afi" id="afd" type="text" placeholder="Описание" autocomplete="off">
    </div>
    <div class="afacts"><button class="afok" id="afok">Добавить</button><button class="afno" id="afno">Отмена</button></div>
  </div>`;

  html+=`
  <div class="dcard">
    <div class="dhdr">
      <div class="dmeta"><div class="dicon">${cd.icon}</div><div class="dtag">${cd.day}</div></div>
      <div class="dname">${esc(cd.name)}</div>
      <div class="dprow"><div class="dptrack"><div class="dpfill" style="width:${cpct}%"></div></div><div class="dppct">${cs2.d}/${cs2.t}</div></div>
    </div>
    ${exs}
  </div>`;

  const mx=Math.max(...st.map(s=>s.d),1);
  let bars='';
  st.forEach((s,i)=>{
    const bh=s.d===0?3:Math.max(5,Math.round((s.d/mx)*60));
    bars+=`<div class="chcol"><div class="chbw"><div class="chb${s.d>0?' f':''}${i===day?' c':''}" style="height:${bh}px"></div></div><div class="chlb"><b>${s.d}</b>/${s.t}</div></div>`;
  });

  html+=`
  <div class="stats">
    <div class="sthd">
      <div class="stlb">прогресс</div>
      <button class="rstbtn" id="rstB">
        <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.75"/></svg>
        сброс
      </button>
    </div>
    <div class="chcard">
      <div class="chbars">${bars}</div>
      <div class="stdiv"></div>
      <div class="trow">
        <div><div class="tnums"><em>${td}</em>/${tt}</div><div class="tsub">упражнений за цикл</div></div>
        <div class="tring">
          <svg viewBox="0 0 50 50">
            <circle class="trk" cx="25" cy="25" r="21" stroke-dasharray="${rc.toFixed(2)}"/>
            <circle class="trf" cx="25" cy="25" r="21" stroke-dasharray="${rc.toFixed(2)}" stroke-dashoffset="${(rc*(1-tpct/100)).toFixed(2)}"/>
          </svg>
          <div class="trpct">${tpct}%</div>
        </div>
      </div>
    </div>
  </div>
  <footer>tracker · прогресс хранится локально</footer>`;

  document.getElementById('app').innerHTML=html;

  /* events */
  document.querySelectorAll('.dp').forEach(el=>{
    el.addEventListener('click',()=>{const i=parseInt(el.dataset.i);if(!isNaN(i)){day=i;form=false;hap();render();}});
  });

  document.querySelectorAll('.tgl').forEach(tgl=>{
    tgl.addEventListener('click',e=>{
      e.stopPropagation();
      const di=parseInt(tgl.dataset.di),ei=parseInt(tgl.dataset.ei),k=`${di}_${ei}`,was=pr[k]||false;
      pr[k]=!was;save();
      if(!was){
        hap('m');burst(tgl);
        const p2=prog(),s2=dstat(p2,di);
        setTimeout(()=>toast(s2.d===s2.t?rnd(DONE):rnd(MOT)),100);
        if(s2.d===s2.t)hap('s');
      }else hap('l');
      render();
    });
  });

  document.querySelectorAll('.stbtn').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const k=btn.dataset.k,step=parseFloat(btn.dataset.s);
      const inp=document.querySelector(`.stval[data-k="${k}"]`);
      if(!inp)return;
      let v=parseFloat(inp.value)||0;v=Math.max(0,Math.round((v+step)*10)/10);
      inp.value=v||'';wt[k]=v?String(v):'';save();hap('l');
    });
  });

  document.querySelectorAll('.stval').forEach(inp=>{
    inp.addEventListener('change',()=>{wt[inp.dataset.k]=inp.value.trim();save();});
  });

  document.getElementById('addB')?.addEventListener('click',()=>{form=true;hap();render();setTimeout(()=>document.getElementById('afn')?.focus(),80);});
  document.getElementById('afno')?.addEventListener('click',()=>{form=false;hap();render();});
  document.getElementById('afok')?.addEventListener('click',()=>{
    const n=document.getElementById('afn')?.value.trim(),s=document.getElementById('afs')?.value.trim(),d=document.getElementById('afd')?.value.trim();
    if(!n||!s){toast('заполни название и подходы');return;}
    const k=`d${day}`;if(!cu[k])cu[k]=[];cu[k].push({name:n,sets:s,desc:d||'—'});
    form=false;hap('s');save();render();toast('добавлено.');
  });
  document.getElementById('rstB')?.addEventListener('click',()=>{
    if(confirm('Сбросить весь прогресс?')){pr={};stk=0;save();hap('m');render();}
  });
  document.getElementById('expB')?.addEventListener('click',()=>{
    const pg=prog();let csv='День,Упражнение,Подходы,Выполнено,Вес(кг)\n';
    pg.forEach((d,di)=>d.exercises.forEach((ex,ei)=>{csv+=`"${d.name}","${ex.name}","${ex.sets}",${pr[`${di}_${ei}`]?'Да':'Нет'},${wt[`${di}_${ei}`]||''}\n`;}));
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download=`tracker_${new Date().toISOString().slice(0,10)}.csv`;a.click();
    toast('экспорт сохранён');hap();
  });
}

async function init(){
  load();
  const sp=document.getElementById('sp'),spl=document.getElementById('splash'),app=document.getElementById('app');
  await new Promise(r=>setTimeout(r,80));sp.classList.add('show');
  await new Promise(r=>setTimeout(r,1650));sp.classList.add('exit');
  await new Promise(r=>setTimeout(r,380));spl.style.opacity='0';
  await new Promise(r=>setTimeout(r,360));spl.style.display='none';
  app.classList.remove('hidden');app.classList.add('in');render();
}
init();
</script>
</body>
</html>
