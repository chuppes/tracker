<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#0c0c0c;
  --s1:#111110;
  --s2:#161513;
  --s3:#1c1a17;
  --s4:#222019;

  --bd:rgba(255,248,235,0.06);
  --bd2:rgba(255,248,235,0.1);
  --bd3:rgba(255,248,235,0.16);

  --t1:#f0ebe4;
  --t2:rgba(240,235,228,0.48);
  --t3:rgba(240,235,228,0.26);
  --t4:rgba(240,235,228,0.1);

  /* sage — muted, warm green. not neon. */
  --a:#9dbf95;
  --a2:#83a97b;
  --a-dim:rgba(157,191,149,0.09);
  --a-glow:rgba(157,191,149,0.2);
  --a-ring:rgba(157,191,149,0.28);

  /* warm sand for secondary */
  --sand:#b8a88a;
  --danger:#b87070;

  --r:18px;
  --r-sm:12px;
  --r-xs:9px;

  --font:'Geist',system-ui,sans-serif;
  --mono:'DM Mono',monospace;
  --safe-b:env(safe-area-inset-bottom,0px);
}

html{height:100%;background:var(--bg)}
body{
  background:var(--bg);
  color:var(--t1);
  font-family:var(--font);
  min-height:100dvh;
  overflow-x:hidden;
  padding-bottom:calc(80px + var(--safe-b));
  -webkit-font-smoothing:antialiased;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 65% 40% at 18% 0%, rgba(157,191,149,0.04) 0%,transparent 70%),
    radial-gradient(ellipse 45% 35% at 82% 95%, rgba(184,168,138,0.03) 0%,transparent 70%);
}

/* ── SPLASH ── */
#splash{
  position:fixed;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;transition:opacity 0.5s ease;
}
.sp{text-align:center;opacity:0;transform:translateY(16px);transition:opacity 0.6s cubic-bezier(0.22,1,0.36,1),transform 0.6s cubic-bezier(0.22,1,0.36,1)}
.sp.show{opacity:1;transform:none}
.sp.exit{opacity:0;transform:translateY(-14px);transition-duration:0.32s}
.sp-word{
  font-family:var(--font);font-size:2.4rem;font-weight:300;
  letter-spacing:0.22em;color:var(--t1);text-transform:lowercase;
}
.sp-word strong{font-weight:600;letter-spacing:0.08em}
.sp-rule{
  width:20px;height:1px;background:var(--t3);
  margin:14px auto;
  transform:scaleX(0);transform-origin:left center;
  transition:transform 0.9s cubic-bezier(0.22,1,0.36,1) 0.25s;
}
.sp.show .sp-rule{transform:scaleX(1)}
.sp-sub{font-family:var(--mono);font-size:0.56rem;color:var(--t3);letter-spacing:0.2em;text-transform:uppercase}

/* ── SHELL ── */
#app{position:relative;z-index:1}
#app.hidden{display:none}
#app.in{animation:ap 0.5s cubic-bezier(0.22,1,0.36,1) both}
@keyframes ap{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* ── HEADER ── */
.hdr{padding:54px 20px 14px;display:flex;align-items:center;justify-content:space-between}
.hdr-eye{font-family:var(--mono);font-size:0.56rem;color:var(--t3);letter-spacing:0.16em;text-transform:uppercase;margin-bottom:5px}
.hdr-title{
  font-size:1.55rem;font-weight:600;letter-spacing:-0.025em;line-height:1;color:var(--t1);
  display:flex;align-items:center;gap:6px;
}
.pulse{
  display:inline-block;width:6px;height:6px;border-radius:50%;
  background:var(--a);box-shadow:0 0 0 0 var(--a-ring);
  animation:pulse-a 2.4s ease-in-out infinite;
}
@keyframes pulse-a{0%,100%{box-shadow:0 0 0 0 var(--a-ring)}50%{box-shadow:0 0 0 5px rgba(157,191,149,0)}}
.hdr-actions{display:flex;gap:7px}
.ic{
  width:35px;height:35px;border-radius:var(--r-xs);
  background:var(--s2);border:1px solid var(--bd);
  color:var(--t2);display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transition:background 0.17s,border-color 0.17s,color 0.17s,transform 0.13s cubic-bezier(0.34,1.56,0.64,1);
  -webkit-user-select:none;user-select:none;
}
.ic:hover{background:var(--s3);border-color:var(--bd2);color:var(--t1)}
.ic:active{transform:scale(0.86)}
.ic svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ── STREAK ── */
.streak{
  margin:0 16px 16px;padding:13px 16px;
  background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);
  display:flex;align-items:center;gap:12px;
  position:relative;overflow:hidden;
}
.streak::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 10%,var(--a-glow) 50%,transparent 90%);
}
.st-icon{font-size:1.4rem;flex-shrink:0;animation:bth 3.5s ease-in-out infinite}
@keyframes bth{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.st-count{font-size:1.1rem;font-weight:600;color:var(--a);line-height:1;letter-spacing:-0.01em}
.st-lbl{font-size:0.66rem;color:var(--t2);margin-top:2px}
.st-bar{flex:1;height:3px;background:var(--t4);border-radius:2px;overflow:hidden}
.st-fill{height:100%;background:linear-gradient(90deg,var(--a2),var(--a));border-radius:2px;transition:width 1.1s cubic-bezier(0.22,1,0.36,1)}

/* ── DAYS ── */
.sec-lbl{font-family:var(--mono);font-size:0.54rem;color:var(--t3);letter-spacing:0.18em;text-transform:uppercase;padding:0 20px;margin-bottom:9px}
.dscroll{overflow-x:auto;padding:0 16px 4px;scrollbar-width:none}
.dscroll::-webkit-scrollbar{display:none}
.drow{display:flex;gap:7px;width:max-content;padding:2px 0}

.dp{display:flex;flex-direction:column;align-items:center;cursor:pointer;-webkit-user-select:none;user-select:none;transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1)}
.dp:active{transform:scale(0.87)}
.dp-ring{position:relative;width:56px;height:56px}
.dp-ring svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)}
.dp-ring circle{fill:none;stroke-width:2}
.rt{stroke:var(--t4)}
.rp{stroke:var(--t3);stroke-linecap:round;transition:stroke-dashoffset 0.65s cubic-bezier(0.22,1,0.36,1),stroke 0.25s}
.dp.act .rp{stroke:var(--a)}
.dp.dn .rp{stroke:var(--a2)}
.dp-bg{position:absolute;inset:5px;border-radius:50%;background:transparent;transition:background 0.22s,box-shadow 0.22s}
.dp.act .dp-bg{background:var(--a-dim);box-shadow:inset 0 0 0 1px var(--a-glow)}
.dp-face{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
.dp-em{font-size:1.05rem;line-height:1}
.dp-pct{font-family:var(--mono);font-size:0.49rem;font-weight:500;color:var(--t3);line-height:1;margin-top:2px;transition:color 0.2s}
.dp.act .dp-pct{color:var(--a)}
.dp.dn .dp-pct{color:var(--a2)}
.dp-nm{font-size:0.54rem;color:var(--t3);margin-top:5px;font-weight:500;transition:color 0.2s;letter-spacing:0.02em}
.dp.act .dp-nm{color:var(--t2)}

/* ── DAY CARD ── */
.dcard{margin:13px 16px 0;background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.4)}

.dhdr{padding:16px 18px 13px;border-bottom:1px solid var(--bd);position:relative;overflow:hidden}
.dhdr::after{content:'';position:absolute;top:-20px;right:-20px;width:90px;height:90px;background:radial-gradient(circle,var(--a-dim) 0%,transparent 70%);pointer-events:none}
.dmeta{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.dicon{width:30px;height:30px;font-size:0.95rem;display:flex;align-items:center;justify-content:center;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r-xs)}
.dtag{font-family:var(--mono);font-size:0.52rem;color:var(--t3);letter-spacing:0.1em;text-transform:uppercase;background:var(--s3);border:1px solid var(--bd);padding:2px 8px;border-radius:20px}
.dname{font-size:0.88rem;font-weight:600;letter-spacing:-0.01em;line-height:1.3;color:var(--t1)}
.dprow{display:flex;align-items:center;gap:9px;margin-top:9px}
.dptrack{flex:1;height:2px;background:var(--t4);border-radius:2px;overflow:hidden}
.dpfill{height:100%;background:linear-gradient(90deg,var(--a2),var(--a));border-radius:2px;transition:width 0.55s cubic-bezier(0.22,1,0.36,1)}
.dppct{font-family:var(--mono);font-size:0.58rem;color:var(--a);font-weight:500;min-width:34px;text-align:right}

/* ── EXERCISE ROW ── */
.ex{display:flex;gap:12px;padding:13px 18px;border-bottom:1px solid var(--bd);transition:background 0.16s;position:relative}
.ex:last-of-type{border-bottom:none}
.ex:active{background:rgba(255,248,235,0.015)}
.ex.dn{background:rgba(157,191,149,0.022)}
.ex.dn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--a2),var(--a));border-radius:0 1px 1px 0}

/* toggle */
.tgl{
  margin-top:2px;flex-shrink:0;width:21px;height:21px;border-radius:7px;
  border:1.5px solid var(--bd2);background:transparent;
  position:relative;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.22s cubic-bezier(0.34,1.56,0.64,1),border-color 0.22s,box-shadow 0.22s,transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
}
.tgl::after{
  content:'';position:absolute;
  width:8px;height:5px;
  border-left:1.8px solid transparent;border-bottom:1.8px solid transparent;
  transform:rotate(-47deg) translate(1px,-0.5px);transition:border-color 0.15s;
}
.tgl.on{background:var(--a2);border-color:var(--a2);box-shadow:0 0 0 3px var(--a-dim),0 2px 10px var(--a-glow)}
.tgl.on::after{border-color:rgba(10,10,10,0.85)}
.tgl:active{transform:scale(0.8)}

.exb{flex:1;min-width:0}
.exr1{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.exnm{font-size:0.82rem;font-weight:500;line-height:1.3;color:var(--t1);transition:color 0.2s}
.ex.dn .exnm{color:var(--t3);text-decoration:line-through;text-decoration-color:var(--t4)}
.exsets{font-family:var(--mono);font-size:0.54rem;color:var(--t2);background:var(--s3);border:1px solid var(--bd);padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;letter-spacing:0.04em}
.exdsc{font-size:0.67rem;color:var(--t3);margin-top:2px;line-height:1.4}
.exwt{display:flex;align-items:center;gap:8px;margin-top:9px}
.wtlbl{font-family:var(--mono);font-size:0.54rem;color:var(--t3);letter-spacing:0.1em}
.stepper{display:flex;align-items:center;background:var(--s4);border:1px solid var(--bd);border-radius:var(--r-xs);overflow:hidden}
.stbtn{width:29px;height:28px;background:transparent;border:none;color:var(--t2);font-family:var(--font);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.13s,color 0.13s,transform 0.11s;-webkit-user-select:none;user-select:none}
.stbtn:hover{background:var(--s3);color:var(--t1)}
.stbtn:active{transform:scale(0.78)}
.stval{font-family:var(--mono);font-size:0.68rem;font-weight:500;color:var(--t1);min-width:38px;text-align:center;background:transparent;border:none;outline:none;padding:0 2px}
.stval::placeholder{color:var(--t3)}
.stunit{font-family:var(--mono);font-size:0.54rem;color:var(--t3);padding-right:8px}

/* ── ADD FORM ── */
.addbtn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:12px;background:transparent;border:none;border-top:1px solid var(--bd);color:var(--t3);font-family:var(--font);font-size:0.74rem;cursor:pointer;transition:color 0.17s,background 0.17s}
.addbtn:hover{color:var(--a);background:var(--a-dim)}
.addbtn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.addform{border-top:1px solid var(--bd);background:var(--s2);padding:14px 18px;display:none;flex-direction:column;gap:8px}
.addform.open{display:flex;animation:sld 0.26s cubic-bezier(0.22,1,0.36,1) both}
@keyframes sld{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
.afi{width:100%;padding:9px 12px;background:var(--s4);border:1px solid var(--bd);color:var(--t1);font-family:var(--font);font-size:0.76rem;border-radius:var(--r-xs);outline:none;transition:border-color 0.17s,box-shadow 0.17s}
.afi:focus{border-color:var(--a2);box-shadow:0 0 0 2px var(--a-dim)}
.afi::placeholder{color:var(--t3)}
.afrow{display:flex;gap:7px}
.afrow .afi{flex:1}
.afacts{display:flex;gap:7px}
.afok{flex:1;padding:9px;background:var(--a2);border:none;color:#0a0a0a;font-family:var(--font);font-size:0.76rem;font-weight:600;border-radius:var(--r-xs);cursor:pointer;transition:background 0.17s,box-shadow 0.17s,transform 0.13s}
.afok:hover{background:var(--a);box-shadow:0 4px 14px var(--a-glow)}
.afok:active{transform:scale(0.95)}
.afno{padding:9px 13px;background:var(--s3);border:1px solid var(--bd2);color:var(--t2);font-family:var(--font);font-size:0.76rem;border-radius:var(--r-xs);cursor:pointer;transition:all 0.17s}
.afno:hover{color:var(--t1)}

/* ── STATS ── */
.stats{margin:13px 16px 0}
.sthd{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.stlb{font-family:var(--mono);font-size:0.54rem;color:var(--t3);letter-spacing:0.18em;text-transform:uppercase}
.rstbtn{display:flex;align-items:center;gap:4px;padding:4px 10px;background:transparent;border:1px solid var(--bd);color:var(--t3);font-family:var(--mono);font-size:0.53rem;letter-spacing:0.06em;border-radius:20px;cursor:pointer;transition:all 0.17s}
.rstbtn svg{width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.rstbtn:hover{border-color:var(--danger);color:var(--danger)}
.chcard{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:16px;box-shadow:0 2px 12px rgba(0,0,0,0.3)}
.chbars{display:flex;gap:5px;align-items:flex-end;height:68px}
.chcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.chbw{flex:1;width:100%;display:flex;align-items:flex-end}
.chb{width:100%;min-height:3px;background:var(--s3);border-radius:3px 3px 0 0;position:relative;overflow:hidden;transition:height 0.5s cubic-bezier(0.22,1,0.36,1)}
.chb.f::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,var(--a) 0%,rgba(131,169,123,0.4) 100%);border-radius:inherit}
.chb.c{box-shadow:0 0 0 1px var(--a-glow)}
.chb.c::after{background:linear-gradient(180deg,var(--a) 0%,var(--a2) 100%)}
.chlb{font-family:var(--mono);font-size:0.46rem;color:var(--t3);text-align:center;line-height:1.3}
.chlb b{display:block;color:var(--t2);font-weight:500}
.stdiv{height:1px;background:var(--bd);margin:14px 0}
.trow{display:flex;align-items:center;justify-content:space-between;gap:12px}
.tnums{font-size:1.4rem;font-weight:600;letter-spacing:-0.02em;color:var(--t1);line-height:1}
.tnums em{color:var(--a);font-style:normal}
.tsub{font-size:0.65rem;color:var(--t2);margin-top:4px}
.tring{width:50px;height:50px;flex-shrink:0;position:relative}
.tring svg{transform:rotate(-90deg);width:100%;height:100%}
.trk{fill:none;stroke:var(--t4);stroke-width:3.5}
.trf{fill:none;stroke:var(--a);stroke-width:3.5;stroke-linecap:round;transition:stroke-dashoffset 0.85s cubic-bezier(0.22,1,0.36,1)}
.trpct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:0.55rem;font-weight:500;color:var(--a)}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:calc(72px + var(--safe-b));left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--s3);border:1px solid var(--bd2);border-radius:100px;
  padding:8px 16px;font-size:0.72rem;color:var(--t1);white-space:nowrap;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);z-index:500;
  opacity:0;pointer-events:none;
  transition:opacity 0.25s cubic-bezier(0.22,1,0.36,1),transform 0.25s cubic-bezier(0.22,1,0.36,1);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── BURST ── */
@keyframes br{0%{transform:scale(0.5);opacity:0.8}100%{transform:scale(2.2);opacity:0}}
.bst{position:fixed;border-radius:50%;border:1.5px solid var(--a);animation:br 0.45s cubic-bezier(0.22,1,0.36,1) forwards;pointer-events:none;z-index:999}
@keyframes cpt{0%{opacity:1}100%{opacity:0;transform:translate(var(--tx),var(--ty)) rotate(180deg)}}
.cpt{position:fixed;width:4px;height:4px;border-radius:1px;animation:cpt 0.65s cubic-bezier(0.22,1,0.36,1) forwards;pointer-events:none;z-index:999}

footer{text-align:center;font-family:var(--mono);font-size:0.52rem;color:var(--t3);letter-spacing:0.12em;padding:16px 16px 4px}
</style>
</head>
<body>

<div id="splash">
  <div class="sp" id="sp">
    <div class="sp-word">track<strong>er</strong></div>
    <div class="sp-rule"></div>
    <div class="sp-sub">тренировки · прогресс</div>
  </div>
</div>

<div id="app" class="hidden"></div>
<div class="toast" id="toast"></div>

<script>
const SK='trk_p3',EK='trk_c3',WK='trk_w3',STK='trk_s3';

const BASE=[
  {day:'День 1',name:'Грудь · Передняя дельта · Трицепс',icon:'🔥',exercises:[
    {name:'Жим штанги лёжа',sets:'4×8–10',desc:'Основа массы груди'},
    {name:'Жим гантелей на наклонной 30°',sets:'4×10–12',desc:'Верх груди'},
    {name:'Отжимания на брусьях с весом',sets:'3×макс',desc:'Трицепс + низ груди'},
    {name:'Французский жим EZ-гриф',sets:'3×12',desc:'Трицепс изоляция'},
    {name:'Разгибание на блоке (канат)',sets:'3×15',desc:'Добивка трицепса'}
  ]},
  {day:'День 2',name:'Спина · Задняя дельта · Бицепс',icon:'💪',exercises:[
    {name:'Подтягивания широким хватом',sets:'4×8–10',desc:'Ширина спины'},
    {name:'Тяга штанги в наклоне',sets:'4×10',desc:'Толщина спины'},
    {name:'Тяга гантели одной рукой',sets:'3×12',desc:'Нижняя широчайшая'},
    {name:'Махи гантелями в наклоне',sets:'3×15',desc:'Задний пучок дельты'},
    {name:'Подъём штанги на бицепс',sets:'3×10',desc:'База на бицепс'},
    {name:'Молотки с гантелями',sets:'3×12',desc:'Плечо + брахиалис'},
    {name:'Шраги с гантелями',sets:'3×15–20',desc:'Верх трапеций'}
  ]},
  {day:'День 3',name:'Отдых · Растяжка',icon:'🧘',exercises:[
    {name:'Растяжка всего тела',sets:'10–15 мин',desc:'Восстановление и мобильность'}
  ]},
  {day:'День 4',name:'Ноги · Пресс · Поясница',icon:'🦵',exercises:[
    {name:'Приседания со штангой',sets:'4×8',desc:'База ног'},
    {name:'Румынская тяга',sets:'4×10',desc:'Бицепс бедра + ягодицы'},
    {name:'Выпады с гантелями',sets:'3×12/н',desc:'Координация + объём'},
    {name:'Сгибание ног в тренажёре',sets:'3×12',desc:'Изоляция'},
    {name:'Подъёмы на носки стоя',sets:'4×15–20',desc:'Икры'},
    {name:'Скручивания на римском стуле',sets:'3×20',desc:'Верх пресса'},
    {name:'Боковые скручивания с блином',sets:'3×15/ст',desc:'Косые'},
    {name:'Гиперэкстензия',sets:'3×15',desc:'Поясница'}
  ]},
  {day:'День 5',name:'Плечи · Руки · Пресс',icon:'💎',exercises:[
    {name:'Жим гантелей сидя',sets:'4×10',desc:'Передний пучок'},
    {name:'Махи гантелями в стороны',sets:'4×15–20',desc:'Средний пучок'},
    {name:'Жим лёжа узким хватом',sets:'3×10',desc:'Трицепс'},
    {name:'Молотки с супинацией',sets:'3×12',desc:'Бицепс'},
    {name:'Планка с касанием плеча',sets:'3×60 сек',desc:'Стабилизация кора'},
    {name:'Вакуум в животе',sets:'5×30 сек',desc:'Глубокий пресс'}
  ]},
  {day:'День 6',name:'Полный отдых',icon:'😴',exercises:[
    {name:'Восстановление',sets:'растяжка',desc:'Дай телу отдохнуть'}
  ]},
  {day:'День 7',name:'Полный отдых',icon:'🌿',exercises:[
    {name:'Восстановление',sets:'сон',desc:'Сон — лучший анаболик'}
  ]}
];

const MOT=['+ 1 к силе.','готово.','зачёт.','сделано.','работа идёт.','по плану.','держишь.','ещё один.'];
const DONE=['день закрыт. хорошая работа.','сотня процентов.','всё сделано.','отличный день.'];
const rnd=a=>a[Math.floor(Math.random()*a.length)];

let wt={},cu={},pr={},stk=0,day=0,form=false;

function load(){
  try{wt=JSON.parse(localStorage.getItem(WK))||{}}catch{wt={}}
  try{cu=JSON.parse(localStorage.getItem(EK))||{}}catch{cu={}}
  try{pr=JSON.parse(localStorage.getItem(SK))||{}}catch{pr={}}
  try{stk=parseInt(localStorage.getItem(STK))||0}catch{stk=0}
}
function save(){
  localStorage.setItem(WK,JSON.stringify(wt));
  localStorage.setItem(EK,JSON.stringify(cu));
  localStorage.setItem(SK,JSON.stringify(pr));
  localStorage.setItem(STK,String(stk));
}

function prog(){
  const p=JSON.parse(JSON.stringify(BASE));
  for(let i=0;i<p.length;i++){const k=`d${i}`;if(cu[k]?.length)p[i].exercises.push(...cu[k]);}
  return p;
}
function dstat(p,i){let d=0;p[i].exercises.forEach((_,e)=>{if(pr[`${i}_${e}`])d++;});return{d,t:p[i].exercises.length};}

let _tt;
function toast(m){const el=document.getElementById('toast');if(!el)return;el.textContent=m;el.classList.add('on');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('on'),2100);}

function burst(el){
  const r=el.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;
  const b=document.createElement('div');b.className='bst';
  b.style.cssText=`left:${cx-16}px;top:${cy-16}px;width:32px;height:32px`;
  document.body.appendChild(b);setTimeout(()=>b.remove(),500);
  ['#9dbf95','#b8a88a','#f0ebe4','#83a97b'].forEach((c,i)=>{
    const p=document.createElement('div');p.className='cpt';
    const a=(i/4)*Math.PI*2,d=20+Math.random()*14;
    p.style.cssText=`left:${cx-2}px;top:${cy-2}px;background:${c};--tx:${(Math.cos(a)*d).toFixed(0)}px;--ty:${(Math.sin(a)*d).toFixed(0)}px`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),700);
  });
}

function hap(t='l'){if(!navigator.vibrate)return;if(t==='l')navigator.vibrate(7);else if(t==='m')navigator.vibrate([10,5,10]);else if(t==='s')navigator.vibrate([8,4,8,4,14]);}

function esc(s){if(!s)return'';return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

function render(){
  const p=prog(),st=p.map((_,i)=>dstat(p,i));
  const td=st.reduce((s,x)=>s+x.d,0),tt=st.reduce((s,x)=>s+x.t,0);
  const tpct=tt?Math.round(td/tt*100):0;
  let cs=0;for(let i=p.length-1;i>=0;i--){if(st[i].d===st[i].t&&st[i].t>0)cs++;else break;}
  if(cs!==stk){stk=cs;save();}

  const dc=2*Math.PI*24, rc=2*Math.PI*21;
  const h=new Date().getHours();
  const gr=h<6?'ночная сессия':h<12?'доброе утро':h<18?'добрый день':'добрый вечер';

  let html=`
  <div class="hdr">
    <div>
      <div class="hdr-eye">${gr}</div>
      <div class="hdr-title">tracker <span class="pulse"></span></div>
    </div>
    <div class="hdr-actions">
      <div class="ic" id="expB" title="Экспорт CSV">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </div>
    </div>
  </div>

  <div class="streak">
    <div class="st-icon">${stk>0?'🔥':'·'}</div>
    <div><div class="st-count">${stk} ${stk===1?'день':stk<5?'дня':'дней'}</div><div class="st-lbl">подряд · серия</div></div>
    <div class="st-bar"><div class="st-fill" style="width:${Math.min(stk/7,1)*100}%"></div></div>
  </div>

  <div class="sec-lbl">Неделя</div>
  <div class="dscroll"><div class="drow">`;

  p.forEach((d,i)=>{
    const s=st[i],pct=s.t?s.d/s.t:0,off=(dc*(1-pct)).toFixed(2),dn=s.d===s.t&&s.t>0;
    html+=`<div class="dp${i===day?' act':''}${dn?' dn':''}" data-i="${i}">
      <div class="dp-ring">
        <div class="dp-bg"></div>
        <svg viewBox="0 0 56 56">
          <circle class="rt" cx="28" cy="28" r="24" stroke-dasharray="${dc.toFixed(2)}"/>
          <circle class="rp" cx="28" cy="28" r="24" stroke-dasharray="${dc.toFixed(2)}" stroke-dashoffset="${off}"/>
        </svg>
        <div class="dp-face"><div class="dp-em">${d.icon}</div><div class="dp-pct">${Math.round(pct*100)}%</div></div>
      </div>
      <div class="dp-nm">${d.day.replace('День ','Д')}</div>
    </div>`;
  });
  html+=`</div></div>`;

  const cd=p[day],cs2=st[day],cpct=cs2.t?Math.round(cs2.d/cs2.t*100):0;
  let exs='';
  cd.exercises.forEach((ex,ei)=>{
    const k=`${day}_${ei}`,on=pr[k]||false,wv=parseFloat(wt[k])||0;
    exs+=`<div class="ex${on?' dn':''}">
      <div class="tgl${on?' on':''}" data-di="${day}" data-ei="${ei}"></div>
      <div class="exb">
        <div class="exr1"><span class="exnm">${esc(ex.name)}</span><span class="exsets">${esc(ex.sets)}</span></div>
        <div class="exdsc">${esc(ex.desc)}</div>
        <div class="exwt">
          <span class="wtlbl">кг</span>
          <div class="stepper">
            <button class="stbtn" data-k="${k}" data-s="-2.5">−</button>
            <input class="stval" type="text" inputmode="decimal" value="${wv||''}" placeholder="—" data-k="${k}">
            <span class="stunit">кг</span>
            <button class="stbtn" data-k="${k}" data-s="2.5">+</button>
          </div>
        </div>
      </div>
    </div>`;
  });

  exs+=`
  <button class="addbtn" id="addB">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    добавить упражнение
  </button>
  <div class="addform${form?' open':''}" id="addF">
    <input class="afi" id="afn" type="text" placeholder="Название упражнения" autocomplete="off">
    <div class="afrow">
      <input class="afi" id="afs" type="text" placeholder="Подходы" autocomplete="off">
      <input class="afi" id="afd" type="text" placeholder="Описание" autocomplete="off">
    </div>
    <div class="afacts"><button class="afok" id="afok">Добавить</button><button class="afno" id="afno">Отмена</button></div>
  </div>`;

  html+=`
  <div class="dcard">
    <div class="dhdr">
      <div class="dmeta"><div class="dicon">${cd.icon}</div><div class="dtag">${cd.day}</div></div>
      <div class="dname">${esc(cd.name)}</div>
      <div class="dprow"><div class="dptrack"><div class="dpfill" style="width:${cpct}%"></div></div><div class="dppct">${cs2.d}/${cs2.t}</div></div>
    </div>
    ${exs}
  </div>`;

  const mx=Math.max(...st.map(s=>s.d),1);
  let bars='';
  st.forEach((s,i)=>{
    const bh=s.d===0?3:Math.max(5,Math.round((s.d/mx)*60));
    bars+=`<div class="chcol"><div class="chbw"><div class="chb${s.d>0?' f':''}${i===day?' c':''}" style="height:${bh}px"></div></div><div class="chlb"><b>${s.d}</b>/${s.t}</div></div>`;
  });

  html+=`
  <div class="stats">
    <div class="sthd">
      <div class="stlb">прогресс</div>
      <button class="rstbtn" id="rstB">
        <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.75"/></svg>
        сброс
      </button>
    </div>
    <div class="chcard">
      <div class="chbars">${bars}</div>
      <div class="stdiv"></div>
      <div class="trow">
        <div><div class="tnums"><em>${td}</em>/${tt}</div><div class="tsub">упражнений за цикл</div></div>
        <div class="tring">
          <svg viewBox="0 0 50 50">
            <circle class="trk" cx="25" cy="25" r="21" stroke-dasharray="${rc.toFixed(2)}"/>
            <circle class="trf" cx="25" cy="25" r="21" stroke-dasharray="${rc.toFixed(2)}" stroke-dashoffset="${(rc*(1-tpct/100)).toFixed(2)}"/>
          </svg>
          <div class="trpct">${tpct}%</div>
        </div>
      </div>
    </div>
  </div>
  <footer>tracker · прогресс хранится локально</footer>`;

  document.getElementById('app').innerHTML=html;

  /* events */
  document.querySelectorAll('.dp').forEach(el=>{
    el.addEventListener('click',()=>{const i=parseInt(el.dataset.i);if(!isNaN(i)){day=i;form=false;hap();render();}});
  });

  document.querySelectorAll('.tgl').forEach(tgl=>{
    tgl.addEventListener('click',e=>{
      e.stopPropagation();
      const di=parseInt(tgl.dataset.di),ei=parseInt(tgl.dataset.ei),k=`${di}_${ei}`,was=pr[k]||false;
      pr[k]=!was;save();
      if(!was){
        hap('m');burst(tgl);
        const p2=prog(),s2=dstat(p2,di);
        setTimeout(()=>toast(s2.d===s2.t?rnd(DONE):rnd(MOT)),100);
        if(s2.d===s2.t)hap('s');
      }else hap('l');
      render();
    });
  });

  document.querySelectorAll('.stbtn').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const k=btn.dataset.k,step=parseFloat(btn.dataset.s);
      const inp=document.querySelector(`.stval[data-k="${k}"]`);
      if(!inp)return;
      let v=parseFloat(inp.value)||0;v=Math.max(0,Math.round((v+step)*10)/10);
      inp.value=v||'';wt[k]=v?String(v):'';save();hap('l');
    });
  });

  document.querySelectorAll('.stval').forEach(inp=>{
    inp.addEventListener('change',()=>{wt[inp.dataset.k]=inp.value.trim();save();});
  });

  document.getElementById('addB')?.addEventListener('click',()=>{form=true;hap();render();setTimeout(()=>document.getElementById('afn')?.focus(),80);});
  document.getElementById('afno')?.addEventListener('click',()=>{form=false;hap();render();});
  document.getElementById('afok')?.addEventListener('click',()=>{
    const n=document.getElementById('afn')?.value.trim(),s=document.getElementById('afs')?.value.trim(),d=document.getElementById('afd')?.value.trim();
    if(!n||!s){toast('заполни название и подходы');return;}
    const k=`d${day}`;if(!cu[k])cu[k]=[];cu[k].push({name:n,sets:s,desc:d||'—'});
    form=false;hap('s');save();render();toast('добавлено.');
  });
  document.getElementById('rstB')?.addEventListener('click',()=>{
    if(confirm('Сбросить весь прогресс?')){pr={};stk=0;save();hap('m');render();}
  });
  document.getElementById('expB')?.addEventListener('click',()=>{
    const pg=prog();let csv='День,Упражнение,Подходы,Выполнено,Вес(кг)\n';
    pg.forEach((d,di)=>d.exercises.forEach((ex,ei)=>{csv+=`${d.name},${ex.name},${ex.sets},${pr[`${di}_${ei}`]?'Да':'Нет'},${wt[`${di}_${ei}`]||''}\n`;}));
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=`tracker_${new Date().toISOString().slice(0,10)}.csv`;a.click();
    toast('экспорт сохранён');hap();
  });
}

async function init(){
  load();
  const sp=document.getElementById('sp'),spl=document.getElementById('splash'),app=document.getElementById('app');
  await new Promise(r=>setTimeout(r,80));sp.classList.add('show');
  await new Promise(r=>setTimeout(r,1650));sp.classList.add('exit');
  await new Promise(r=>setTimeout(r,380));spl.style.opacity='0';
  await new Promise(r=>setTimeout(r,360));spl.style.display='none';
  app.classList.remove('hidden');app.classList.add('in');render();
}
init();
</script>
</body>
</html>
